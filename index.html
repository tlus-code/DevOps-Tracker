<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ENV PROMOTION TRACKER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #04070e;
  --bg2:      #080d18;
  --bg3:      #0d1425;
  --panel:    #0a1020;
  --border:   #1a2540;
  --border2:  #243050;
  --amber:    #f0a500;
  --amber2:   #ffc740;
  --amber-dim:#7a5200;
  --green:    #00e676;
  --green-dim:#004d27;
  --red:      #ff4444;
  --red-dim:  #4d0a0a;
  --blue:     #4488ff;
  --blue-dim: #0a1a44;
  --purple:   #aa66ff;
  --cyan:     #00ccff;
  --text:     #b8cce0;
  --text2:    #6a85a8;
  --text3:    #3a506a;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-mono);
  min-height:100vh;
  overflow-x:hidden;
}

/* Scanline overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;
  z-index:9999;
}
/* Ambient grid bg */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(240,165,0,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(240,165,0,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
select option{background:var(--bg2);color:var(--text);}
input::placeholder,textarea::placeholder{color:var(--text3);}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:none;}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0.4);}50%{box-shadow:0 0 0 8px rgba(240,165,0,0);}}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(0,230,118,0.8);}50%{text-shadow:0 0 20px rgba(0,230,118,1),0 0 40px rgba(0,230,118,0.4);}}
@keyframes scanIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:none;}}

.slide-down{animation:slideDown 0.22s ease;}
.slide-up  {animation:slideUp   0.22s ease;}
.scan-in   {animation:scanIn    0.18s ease;}

/* ── Base inputs ── */
.inp{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:3px;
  color:var(--text);
  padding:8px 12px;
  font-size:12px;
  font-family:var(--font-mono);
  outline:none;
  width:100%;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.inp:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(240,165,0,0.12);}

/* ── Buttons ── */
.btn{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:none;
  border-radius:3px;
  padding:8px 16px;
  transition:all 0.15s;
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.btn:active{transform:scale(0.97);}
.btn-amber{background:rgba(240,165,0,0.12);color:var(--amber);border:1px solid rgba(240,165,0,0.3);}
.btn-amber:hover{background:rgba(240,165,0,0.2);border-color:var(--amber);}
.btn-green{background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.btn-green:hover{background:rgba(0,230,118,0.18);}
.btn-red{background:rgba(255,68,68,0.1);color:var(--red);border:1px solid rgba(255,68,68,0.3);}
.btn-red:hover{background:rgba(255,68,68,0.2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3);}

/* ── Tab bar ── */
.tab{background:none;border:none;font-family:var(--font-mono);font-size:11px;font-weight:600;cursor:pointer;padding:10px 18px;color:var(--text3);border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.15s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ── Toggle switch ── */
.toggle-wrap{display:flex;align-items:center;gap:12px;cursor:pointer;padding:8px 0;}
.toggle-track{width:38px;height:20px;border-radius:10px;position:relative;flex-shrink:0;transition:all 0.2s;}
.toggle-thumb{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;transition:left 0.2s;}

/* ── SQL chips ── */
.sql-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:2px;font-size:10px;font-family:var(--font-mono);font-weight:700;cursor:pointer;border:1px solid;transition:all 0.15s;letter-spacing:0.06em;text-transform:uppercase;user-select:none;}

/* ── Row card ── */
.activity-row{
  position:relative;
  border-bottom:1px solid var(--border);
  transition:background 0.12s;
  cursor:pointer;
}
.activity-row:hover{background:rgba(240,165,0,0.03);}
.activity-row:hover .row-indicator{opacity:1;}
.row-indicator{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  opacity:0;transition:opacity 0.15s;
}

/* ── Status node ── */
.status-node{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;font-size:9px;font-weight:700;
  font-family:var(--font-mono);letter-spacing:0.06em;
  border-radius:2px;border:1px solid;white-space:nowrap;
}

/* ── Circuit connector ── */
.connector{
  display:inline-block;width:14px;height:1px;
  vertical-align:middle;margin:0 1px;flex-shrink:0;
}

/* ── Panel ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;}

/* ── Stat gauge ── */
.gauge{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:16px 20px;
  position:relative;
  overflow:hidden;
}
.gauge::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.gauge-amber::before{background:linear-gradient(90deg,transparent,var(--amber),transparent);}
.gauge-green::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.gauge-red::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.gauge-blue::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(4,7,14,0.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════ */
const ENVS = ["DEV","QA","DEV2","QA2","PROD"];
const ENV_META = {
  DEV:  {label:"DEV",  sub:"Feature Branch",   color:"#4488ff", dim:"#0a1a44"},
  QA:   {label:"QA",   sub:"Feature Testing",  color:"#aa66ff", dim:"#1a0a44"},
  DEV2: {label:"DEV2", sub:"Prod Base",         color:"#f0a500", dim:"#3a2800"},
  QA2:  {label:"QA2",  sub:"Hotfix Valid.",     color:"#ff7722", dim:"#3a1800"},
  PROD: {label:"PROD", sub:"Production",        color:"#00e676", dim:"#003a1a"},
};
const STATUS_OPTIONS = ["Not Started","In Progress","Done","Blocked","Skipped"];
const STATUS_CFG = {
  "Not Started": {bg:"#080d18",text:"#3a506a",border:"#1a2540",icon:"◌"},
  "In Progress": {bg:"#0a1a44",text:"#4488ff",border:"#1a3a88",icon:"▶"},
  "Done":        {bg:"#003a1a",text:"#00e676",border:"#006633",icon:"✓"},
  "Blocked":     {bg:"#2a0808",text:"#ff4444",border:"#661111",icon:"✕"},
  "Skipped":     {bg:"#0d1020",text:"#3a506a",border:"#1a2540",icon:"—"},
};
const TYPE_OPTIONS = ["Feature","Hotfix","Config","Release","Rollback"];
const TYPE_CFG = {
  Feature: {color:"#4488ff"},
  Hotfix:  {color:"#f0a500"},
  Config:  {color:"#aa66ff"},
  Release: {color:"#00e676"},
  Rollback:{color:"#ff4444"},
};
const SQL_TYPES = [
  {key:"insert",label:"INSERT",color:"#00e676"},
  {key:"update",label:"UPDATE",color:"#4488ff"},
  {key:"delete",label:"DELETE",color:"#ff4444"},
  {key:"modify",label:"MODIFY",color:"#f0a500"},
  {key:"view",  label:"VIEW",  color:"#aa66ff"},
  {key:"materializedView",label:"MAT. VIEW",color:"#ff7722"},
];
const PROMO_PATHS = {
  feature:["DEV","QA","PROD"],
  hotfix: ["DEV2","QA2","PROD","DEV","QA"],
};
const SCRIPT_URL_KEY = "env-tracker-script-url-v2";
const getTrack = i => (i.type==="Hotfix"||i.type==="Config")?"hotfix":"feature";
const EMPTY_CHANGES = () => ({hasConfig:false,configDetails:"",hasCodeChange:false,codeDetails:"",hasSql:false,sqlTypes:[],sqlDetails:""});
const EMPTY_STATUSES = () => ({DEV:"Not Started",QA:"Not Started",DEV2:"Not Started",QA2:"Not Started",PROD:"Not Started"});
const EMPTY_ITEM = () => ({
  id: Date.now().toString(36)+Math.random().toString(36).slice(2),
  dropNumber:`D1-${new Date().getFullYear()}`,
  ticket:"",title:"",type:"Feature",owner:"",priority:"Medium",
  notes:"",changes:EMPTY_CHANGES(),
  createdAt:new Date().toISOString().slice(0,10),
  statuses:EMPTY_STATUSES(),
});

/* ════════════════════════════════════════════
   API
════════════════════════════════════════════ */
async function callApi(url,action,payload={}){
  const r = await fetch(url,{method:"POST",body:JSON.stringify({action,payload})});
  const j = await r.json();
  if(!j.ok) throw new Error(j.error||"API error");
  return j;
}

/* ════════════════════════════════════════════
   EXCEL EXPORT
════════════════════════════════════════════ */
function exportToExcel(items){
  const rows = items.map(i=>{
    const c = i.changes||{};
    const sqlOps = (c.sqlTypes||[]).map(k=>SQL_TYPES.find(t=>t.key===k)?.label||k).join(", ");
    return {
      "Drop Number":      i.dropNumber||"",
      "Ticket":           i.ticket||"",
      "Title":            i.title||"",
      "Type":             i.type||"",
      "Track":            getTrack(i)==="feature"?"Feature":"Hotfix/Config",
      "Owner":            i.owner||"",
      "Priority":         i.priority||"",
      "Created Date":     i.createdAt||"",
      "DEV Status":       i.statuses?.DEV||"",
      "QA Status":        i.statuses?.QA||"",
      "DEV2 Status":      i.statuses?.DEV2||"",
      "QA2 Status":       i.statuses?.QA2||"",
      "PROD Status":      i.statuses?.PROD||"",
      "Config Changes":   c.hasConfig  ?"YES":"NO",
      "Config Details":   c.configDetails||"",
      "Code Change":      c.hasCodeChange?"YES":"NO",
      "Code Details":     c.codeDetails||"",
      "SQL/DB Change":    c.hasSql     ?"YES":"NO",
      "SQL Operations":   sqlOps,
      "SQL Details":      c.sqlDetails||"",
      "Notes":            i.notes||"",
    };
  });

  const ws = XLSX.utils.json_to_sheet(rows);

  // Column widths
  ws["!cols"] = [
    {wch:12},{wch:14},{wch:40},{wch:10},{wch:14},{wch:16},{wch:10},{wch:14},
    {wch:14},{wch:14},{wch:14},{wch:14},{wch:14},
    {wch:14},{wch:30},{wch:14},{wch:30},{wch:14},{wch:22},{wch:30},{wch:40},
  ];

  // Header style — bold amber
  const headerRange = XLSX.utils.decode_range(ws["!ref"]);
  for(let C=headerRange.s.c;C<=headerRange.e.c;C++){
    const addr = XLSX.utils.encode_cell({r:0,c:C});
    if(!ws[addr]) continue;
    ws[addr].s = {
      font:{bold:true,color:{rgb:"F0A500"},sz:11},
      fill:{fgColor:{rgb:"0A1020"}},
      border:{bottom:{style:"thin",color:{rgb:"F0A500"}}},
      alignment:{horizontal:"center"},
    };
  }

  // Status color coding
  const statusColors = {
    "Done":        "00E676",
    "In Progress": "4488FF",
    "Blocked":     "FF4444",
    "Skipped":     "6A85A8",
    "Not Started": "3A506A",
  };
  const statusCols = [8,9,10,11,12]; // DEV,QA,DEV2,QA2,PROD col indices
  for(let R=1;R<=rows.length;R++){
    statusCols.forEach(C=>{
      const addr = XLSX.utils.encode_cell({r:R,c:C});
      if(!ws[addr]) return;
      const val = ws[addr].v;
      const col = statusColors[val]||"3A506A";
      ws[addr].s = {
        font:{color:{rgb:col},bold:true,sz:10},
        alignment:{horizontal:"center"},
      };
    });
    // Alternating row bg
    for(let C=headerRange.s.c;C<=headerRange.e.c;C++){
      const addr = XLSX.utils.encode_cell({r:R,c:C});
      if(!ws[addr]){ws[addr]={t:"s",v:""};} 
      if(!ws[addr].s) ws[addr].s={};
      ws[addr].s.fill = {fgColor:{rgb: R%2===0?"080D18":"0A1020"}};
      if(!ws[addr].s.font) ws[addr].s.font={};
      ws[addr].s.font.sz=10;
      ws[addr].s.alignment={wrapText:true,vertical:"top"};
    }
  }

  // Summary sheet
  const envOrder = ["DEV","QA","DEV2","QA2","PROD"];
  const summaryRows = [["Environment","Total","Done","In Progress","Blocked","Not Started","Skipped","% Complete"]];
  envOrder.forEach(env=>{
    const relevant = items.filter(i=>{
      const t=getTrack(i);
      if(env==="PROD") return true;
      if(t==="hotfix") return true;
      return ["DEV","QA"].includes(env);
    });
    const done = relevant.filter(i=>i.statuses[env]==="Done").length;
    const inP  = relevant.filter(i=>i.statuses[env]==="In Progress").length;
    const blk  = relevant.filter(i=>i.statuses[env]==="Blocked").length;
    const ns   = relevant.filter(i=>i.statuses[env]==="Not Started").length;
    const sk   = relevant.filter(i=>i.statuses[env]==="Skipped").length;
    const pct  = relevant.length?Math.round((done/relevant.length)*100):0;
    summaryRows.push([env,relevant.length,done,inP,blk,ns,sk,pct+"%"]);
  });
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary["!cols"]=[{wch:14},{wch:8},{wch:8},{wch:14},{wch:10},{wch:14},{wch:10},{wch:12}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Activities");
  XLSX.utils.book_append_sheet(wb,wsSummary,"Summary");

  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`env-tracker-${ts}.xlsx`);
}

/* ════════════════════════════════════════════
   ATOMS
════════════════════════════════════════════ */
function Spinner({size=14}){
  return <span style={{display:"inline-block",width:size,height:size,border:"1.5px solid #1a2540",borderTopColor:"var(--amber)",borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;
}

function LiveDot(){
  return <span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 6px var(--green)",animation:"glow 2s ease-in-out infinite",flexShrink:0}}/>;
}

function SectionLabel({children,style={}}){
  return <div style={{fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"var(--text3)",marginBottom:8,...style}}>{children}</div>;
}

function StatusSelect({value,onChange,disabled}){
  const c = STATUS_CFG[value]||STATUS_CFG["Not Started"];
  return (
    <select value={value} onChange={e=>onChange(e.target.value)} disabled={disabled} style={{
      background:c.bg, color:c.text, border:`1px solid ${c.border}`,
      borderRadius:2, padding:"3px 7px", fontSize:10, fontWeight:700,
      fontFamily:"var(--font-mono)", cursor:disabled?"not-allowed":"pointer",
      width:"100%", outline:"none", opacity:disabled?0.25:1, letterSpacing:"0.04em",
    }}>
      {STATUS_OPTIONS.map(o=><option key={o} value={o}>{c.icon} {o}</option>)}
    </select>
  );
}

function Toggle({checked,onChange,label,color="var(--amber)"}){
  return (
    <div className="toggle-wrap" onClick={()=>onChange(!checked)}>
      <div className="toggle-track" style={{background:checked?color+"22":"var(--bg2)",border:`1px solid ${checked?color+"55":"var(--border2)"}`}}>
        <div className="toggle-thumb" style={{left:checked?20:2,background:checked?color:"var(--text3)"}}/>
      </div>
      <span style={{fontSize:12,color:checked?"var(--text)":"var(--text2)",fontFamily:"var(--font-mono)",fontWeight:checked?500:400}}>{label}</span>
    </div>
  );
}

/* ════════════════════════════════════════════
   CIRCUIT PROMO BAR
════════════════════════════════════════════ */
function CircuitBar({item}){
  const track = getTrack(item);
  const path  = PROMO_PATHS[track];
  return (
    <div style={{display:"flex",alignItems:"center",gap:0,flexWrap:"nowrap"}}>
      {path.map((env,i)=>{
        const em  = ENV_META[env];
        const sc  = STATUS_CFG[item.statuses[env]]||STATUS_CFG["Not Started"];
        const icon= sc.icon;
        const isReturn = i===3 && track==="hotfix";
        return (
          <React.Fragment key={env}>
            {isReturn && (
              <span style={{color:"var(--amber)",fontSize:9,margin:"0 3px",fontWeight:700}}>↺</span>
            )}
            <div className="status-node" style={{background:sc.bg,color:sc.text,borderColor:sc.border}}>
              <span style={{color:em.color,fontSize:8,fontWeight:800}}>{env}</span>
              <span style={{fontSize:9}}>{icon}</span>
            </div>
            {i<path.length-1 && !isReturn && (
              <svg width="16" height="8" style={{flexShrink:0}}>
                <line x1="0" y1="4" x2="14" y2="4" stroke={sc.text==="var(--text3)"||sc.text==="#3a506a"?"#1a2540":sc.text} strokeWidth="1" strokeDasharray={sc.icon==="✓"?"":"3,2"}/>
                <circle cx="14" cy="4" r="1.5" fill={sc.icon==="✓"?sc.text:"#1a2540"}/>
              </svg>
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════════════════
   CHANGES SECTION
════════════════════════════════════════════ */
function ChangesSection({changes,setChanges}){
  const set=(k,v)=>setChanges(c=>({...c,[k]:v}));
  const toggleSql=k=>{
    const cur=changes.sqlTypes||[];
    set("sqlTypes",cur.includes(k)?cur.filter(x=>x!==k):[...cur,k]);
  };

  const block=(title,color,isOn,onToggle,children)=>(
    <div style={{background:"var(--bg2)",border:`1px solid ${isOn?color+"44":"var(--border)"}`,borderRadius:3,marginBottom:10,overflow:"hidden",transition:"border-color 0.2s"}}>
      <div style={{padding:"10px 14px",borderBottom:isOn?"1px solid var(--border)":"none"}}>
        <Toggle checked={isOn} onChange={onToggle} label={title} color={color}/>
      </div>
      {isOn&&<div style={{padding:"12px 14px"}}>{children}</div>}
    </div>
  );

  return (
    <div>
      {block("Config Changes","var(--purple)",changes.hasConfig,v=>set("hasConfig",v),
        <textarea className="inp" value={changes.configDetails} onChange={e=>set("configDetails",e.target.value)}
          placeholder={"Config keys / values changed\nFeature toggles, env flags, external endpoints…"}
          rows={3} style={{resize:"vertical",fontSize:11,lineHeight:1.7}}/>
      )}
      {block("Code Change","var(--blue)",changes.hasCodeChange,v=>set("hasCodeChange",v),
        <textarea className="inp" value={changes.codeDetails} onChange={e=>set("codeDetails",e.target.value)}
          placeholder={"Modules / services changed\nPR links, branch names, deployment steps…"}
          rows={3} style={{resize:"vertical",fontSize:11,lineHeight:1.7}}/>
      )}
      {block("SQL / DB Changes","var(--green)",changes.hasSql,v=>set("hasSql",v),
        <div>
          <SectionLabel>Operation Types</SectionLabel>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {SQL_TYPES.map(t=>{
              const on=(changes.sqlTypes||[]).includes(t.key);
              return (
                <div key={t.key} className="sql-chip" onClick={()=>toggleSql(t.key)} style={{
                  background:on?t.color+"18":"transparent",
                  color:on?t.color:"var(--text3)",
                  borderColor:on?t.color+"55":"var(--border2)",
                  boxShadow:on?`0 0 10px ${t.color}22`:"none",
                }}>
                  {on&&"✓ "}{t.label}
                </div>
              );
            })}
          </div>
          <SectionLabel>Query / Change Details</SectionLabel>
          <textarea className="inp" value={changes.sqlDetails} onChange={e=>set("sqlDetails",e.target.value)}

    </div>
  );
}

      {delConf&&(

/* ════════════════════════════════════════════
   SETUP SCREEN
════════════════════════════════════════════ */
function SetupScreen({onConnect}){
  const [url,setUrl]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");

  const connect=async()=>{
    if(!url.trim()){setErr("Script URL required.");return;}
    setBusy(true);setErr("");
    try{
      const r=await fetch(url.trim()+"?action=getAll");
      const j=await r.json();
      if(j.ok!==undefined) onConnect(url.trim());
      else setErr("Unexpected response. Check deployment settings.");
    }catch{setErr("Cannot reach the script. Verify the URL and try again.");}
    setBusy(false);
  };

  const steps=[
    {n:"01",t:"Create Google Sheet",    d:"sheets.google.com → New spreadsheet"},
    {n:"02",t:"Open Apps Script",       d:"Extensions → Apps Script → clear existing code"},
    {n:"03",t:"Paste Code.gs",          d:"Copy the provided Code.gs and paste it. Ctrl+S to save."},
    {n:"04",t:"Deploy as Web App",      d:"Deploy → New Deployment → Web App · Execute as: Me · Access: Anyone · Authorize"},
    {n:"05",t:"Copy the /exec URL",     d:"Paste the generated URL below"},
  ];

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",zIndex:1}}>
      <div className="slide-up" style={{maxWidth:560,width:"100%"}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontFamily:"var(--font-head)",fontSize:48,letterSpacing:"0.12em",color:"var(--amber)",lineHeight:1,marginBottom:6}}>ENV TRACKER</div>
          <div style={{fontSize:11,color:"var(--text3)",letterSpacing:"0.2em",textTransform:"uppercase"}}>Mission Operations Console · Setup</div>
        </div>

        <div className="panel" style={{padding:32}}>
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"var(--font-head)",fontSize:18,letterSpacing:"0.1em",color:"var(--text)",marginBottom:6}}>CONNECT DATA SOURCE</div>
            <div style={{color:"var(--text2)",fontSize:11,lineHeight:1.8}}>Your team's data is stored in Google Sheets. Complete setup once — everyone shares the same live tracker.</div>
          </div>

          {steps.map(({n,t,d})=>(
            <div key={n} style={{display:"flex",gap:16,marginBottom:14,alignItems:"flex-start"}}>
              <div style={{fontFamily:"var(--font-head)",fontSize:20,color:"var(--amber-dim)",flexShrink:0,lineHeight:1,marginTop:2,letterSpacing:"0.05em"}}>{n}</div>
              <div style={{borderLeft:"1px solid var(--border)",paddingLeft:14}}>
                <div style={{fontSize:12,fontWeight:600,color:"var(--text)",marginBottom:2,fontFamily:"var(--font-mono)"}}>{t}</div>
                <div style={{fontSize:11,color:"var(--text2)",lineHeight:1.6,fontFamily:"var(--font-mono)"}}>{d}</div>
              </div>
            </div>
          ))}

          <div style={{borderTop:"1px solid var(--border)",paddingTop:20,marginTop:8}}>
            <SectionLabel style={{marginBottom:8}}>Apps Script Web App URL</SectionLabel>
            <input className="inp" value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&connect()} placeholder="https://script.google.com/macros/s/…/exec"/>
            {err&&<div style={{color:"var(--red)",fontSize:11,fontFamily:"var(--font-mono)",marginTop:8}}>⚠ {err}</div>}
            <button className="btn btn-amber" onClick={connect} disabled={busy} style={{marginTop:14,width:"100%",padding:"11px",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {busy?<><Spinner/>TESTING CONNECTION…</>:"CONNECT & LAUNCH →"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════ */
function App(){
  const [scriptUrl, setScriptUrl]  = useState(()=>localStorage.getItem(SCRIPT_URL_KEY)||"");
  const [items,     setItems]      = useState([]);
  const [loading,   setLoading]    = useState(false);
  const [saving,    setSaving]     = useState(false);
  const [error,     setError]      = useState("");
  const [modal,     setModal]      = useState(null);
  const [expanded,  setExpanded]   = useState(null);
  const [delTarget, setDelTarget]  = useState(null);
  const [filter,    setFilter]     = useState({type:"All",status:"All",track:"All",drop:"",search:""});
  const [sort,      setSort]       = useState("createdAt");
  const [lastSync,  setLastSync]   = useState(null);

  const fetchAll=useCallback(async(url=scriptUrl)=>{
    if(!url)return;
    setLoading(true);setError("");
    try{
      const r=await fetch(url+"?action=getAll");
      const j=await r.json();
      if(!j.ok) throw new Error(j.error);
      setItems((j.items||[]).map(i=>({...i,changes:i.changes||EMPTY_CHANGES()})));
      setLastSync(new Date());
    }catch(e){setError("Load failed: "+e.message);}
    setLoading(false);
  },[scriptUrl]);

  useEffect(()=>{if(scriptUrl)fetchAll(scriptUrl);},[scriptUrl]);

  const handleSave=async draft=>{
    setSaving(true);setError("");
    try{
      await callApi(scriptUrl,"save",draft);
      if(modal?.mode==="new") setItems(p=>[draft,...p]);
      else setItems(p=>p.map(i=>i.id===draft.id?draft:i));
      setModal(null);
    }catch(e){setError("Save failed: "+e.message);}
    setSaving(false);
  };

  const handleDelete=async id=>{
    setSaving(true);setError("");
    try{
      await callApi(scriptUrl,"delete",{id});
      setItems(p=>p.filter(i=>i.id!==id));
      setModal(null);setExpanded(null);setDelTarget(null);
    }catch(e){setError("Delete failed: "+e.message);}
    setSaving(false);
  };

  const updateStatus=async(item,env,val)=>{
    const up={...item,statuses:{...item.statuses,[env]:val}};
    setItems(p=>p.map(i=>i.id===item.id?up:i));
    try{await callApi(scriptUrl,"save",up);}
    catch(e){
      setItems(p=>p.map(i=>i.id===item.id?item:i));
      setError("Status update failed: "+e.message);
    }
  };

  const allDrops=[...new Set(items.map(i=>i.dropNumber).filter(Boolean))].sort();
  const pColor={Critical:"#ff4444",High:"#f0a500",Medium:"#4488ff",Low:"#3a506a"};

  const filtered=items.filter(i=>{
    const t=getTrack(i);
    if(filter.type !=="All"&&i.type!==filter.type)  return false;
    if(filter.track!=="All"&&t!==filter.track)       return false;
    if(filter.status!=="All"&&!Object.values(i.statuses).includes(filter.status)) return false;
    if(filter.drop&&i.dropNumber!==filter.drop)      return false;
    if(filter.search){
      const q=filter.search.toLowerCase();
      if(![i.ticket,i.title,i.owner,i.dropNumber].some(f=>f?.toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a,b)=>{
    if(sort==="priority") return ["Critical","High","Medium","Low"].indexOf(a.priority)-["Critical","High","Medium","Low"].indexOf(b.priority);
    if(sort==="type")     return a.type.localeCompare(b.type);
    if(sort==="drop")     return (a.dropNumber||"").localeCompare(b.dropNumber||"");
    return b.createdAt.localeCompare(a.createdAt);
  });

  const stats={
    total:      items.length,
    inProgress: items.filter(i=>Object.values(i.statuses).includes("In Progress")).length,
    blocked:    items.filter(i=>Object.values(i.statuses).includes("Blocked")).length,
    inProd:     items.filter(i=>i.statuses.PROD==="Done").length,
  };

  if(!scriptUrl) return <SetupScreen onConnect={url=>{localStorage.setItem(SCRIPT_URL_KEY,url);setScriptUrl(url);}}/>;

  return (
    <div style={{minHeight:"100vh",position:"relative",zIndex:1}}>

      {/* ── TOP HEADER BAR ── */}
      <div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"0 28px"}}>
        <div style={{maxWidth:1440,margin:"0 auto",display:"flex",alignItems:"center",gap:0,height:56}}>
          {/* Logo */}
          <div style={{display:"flex",alignItems:"center",gap:14,paddingRight:28,borderRight:"1px solid var(--border)",marginRight:28}}>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              <div style={{display:"flex",gap:3}}>
                {["DEV","QA"].map(e=><div key={e} style={{width:6,height:6,borderRadius:1,background:ENV_META[e].color,boxShadow:`0 0 4px ${ENV_META[e].color}`}}/>)}
              </div>
              <div style={{display:"flex",gap:3}}>
                {["DEV2","QA2","PROD"].map(e=><div key={e} style={{width:6,height:6,borderRadius:1,background:ENV_META[e].color,boxShadow:`0 0 4px ${ENV_META[e].color}`}}/>)}
              </div>
            </div>
            <div>
              <div style={{fontFamily:"var(--font-head)",fontSize:18,letterSpacing:"0.14em",color:"var(--amber)",lineHeight:1}}>ENV TRACKER</div>
              <div style={{fontSize:8,color:"var(--text3)",letterSpacing:"0.18em",textTransform:"uppercase",marginTop:1}}>Mission Operations</div>
            </div>
          </div>

          {/* Live indicator + sync */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginRight:"auto"}}>
            <LiveDot/>
            <span style={{fontSize:9,color:"var(--green)",fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.1em"}}>LIVE</span>
            {lastSync&&<span style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>· {lastSync.toLocaleTimeString()}</span>}
          </div>

          {/* Actions */}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-ghost" onClick={()=>fetchAll()} disabled={loading} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",fontSize:10}}>
              {loading?<Spinner/>:"⟳"} SYNC
            </button>
            <button className="btn" onClick={()=>exportToExcel(items)} style={{background:"rgba(0,230,118,0.08)",color:"var(--green)",border:"1px solid rgba(0,230,118,0.25)",display:"flex",alignItems:"center",gap:6,padding:"6px 14px",fontSize:10}}>
              ⬇ EXPORT EXCEL
            </button>
            <button className="btn btn-amber" onClick={()=>setModal({mode:"new",item:EMPTY_ITEM()})} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",fontSize:10}}>
              ⊕ NEW ACTIVITY
            </button>
            <button className="btn btn-ghost" title="Reconnect" onClick={()=>{localStorage.removeItem(SCRIPT_URL_KEY);setScriptUrl("");}} style={{padding:"6px 10px",fontSize:13,lineHeight:1}}>⚙</button>
          </div>
        </div>
      </div>

      {/* ── MAIN CONTENT ── */}
      <div style={{maxWidth:1440,margin:"0 auto",padding:"24px 28px"}}>

        {/* Error */}
        {error&&(
          <div style={{background:"rgba(255,68,68,0.08)",border:"1px solid rgba(255,68,68,0.3)",borderRadius:3,padding:"10px 16px",marginBottom:20,color:"#ff8888",fontSize:11,fontFamily:"var(--font-mono)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>⚠ {error}</span>
            <button onClick={()=>setError("")} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:16}}>✕</button>
          </div>
        )}

        {/* ── STATS ROW ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          {[
            {label:"Total Activities",  value:stats.total,      cls:"gauge-amber", color:"var(--amber)"},
            {label:"In Progress",       value:stats.inProgress, cls:"gauge-blue",  color:"var(--blue)"},
            {label:"Blocked",           value:stats.blocked,    cls:"gauge-red",   color:"var(--red)"},
            {label:"Deployed to PROD",  value:stats.inProd,     cls:"gauge-green", color:"var(--green)"},
          ].map(({label,value,cls,color})=>(
            <div key={label} className={`gauge ${cls}`}>
              <div style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--font-mono)",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:8}}>{label}</div>
              <div style={{fontFamily:"var(--font-head)",fontSize:42,color,lineHeight:1,letterSpacing:"0.04em"}}>{String(value).padStart(2,"0")}</div>
              <div style={{height:2,background:"var(--border)",borderRadius:1,marginTop:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:items.length?`${Math.round((value/items.length)*100)}%`:"0%",background:color,borderRadius:1,transition:"width 0.5s",boxShadow:`0 0 6px ${color}`}}/>
              </div>
            </div>
          ))}
        </div>

        {/* ── ENV PIPELINE OVERVIEW ── */}
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:4,padding:"16px 20px",marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{width:20,height:1,background:"var(--amber-dim)"}}/>
            <span style={{fontSize:9,color:"var(--amber-dim)",fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.16em"}}>PIPELINE STATUS</span>
            <div style={{flex:1,height:1,background:"var(--border)"}}/>
            {/* Track badges */}
            <div style={{display:"flex",gap:12}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,background:"var(--blue)",borderRadius:1}}/>
                <span style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>FEATURE: DEV→QA→PROD</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,background:"var(--amber)",borderRadius:1}}/>
                <span style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>HOTFIX: DEV2→QA2→PROD↺DEV→QA</span>
              </div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
            {ENVS.map(env=>{
              const em=ENV_META[env];
              const rel=items.filter(i=>{const t=getTrack(i);if(env==="PROD")return true;if(t==="hotfix")return true;return["DEV","QA"].includes(env);});
              const done  =rel.filter(i=>i.statuses[env]==="Done").length;
              const active=rel.filter(i=>i.statuses[env]==="In Progress").length;
              const blkd  =rel.filter(i=>i.statuses[env]==="Blocked").length;
              const pct   =rel.length?Math.round((done/rel.length)*100):0;
              return (
                <div key={env} style={{background:"var(--bg3)",border:`1px solid ${em.color}22`,borderRadius:3,padding:"12px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{color:em.color,fontFamily:"var(--font-mono)",fontWeight:800,fontSize:13,letterSpacing:"0.08em"}}>{em.label}</div>
                      <div style={{color:"var(--text3)",fontSize:8,fontFamily:"var(--font-mono)",marginTop:1,letterSpacing:"0.06em"}}>{em.sub.toUpperCase()}</div>
                    </div>
                    <div style={{fontFamily:"var(--font-head)",fontSize:22,color:em.color,lineHeight:1}}>{pct}<span style={{fontSize:12}}>%</span></div>
                  </div>
                  <div style={{height:3,background:"var(--border)",borderRadius:1,overflow:"hidden",marginBottom:8}}>
                    <div style={{height:"100%",width:`${pct}%`,background:em.color,borderRadius:1,transition:"width 0.5s",boxShadow:`0 0 4px ${em.color}88`}}/>
                  </div>
                  <div style={{display:"flex",gap:10,fontSize:9,fontFamily:"var(--font-mono)"}}>
                    <span style={{color:"var(--green)"}}>{done}✓</span>
                    {active>0&&<span style={{color:"var(--blue)"}}>{active}▶</span>}
                    {blkd>0&&<span style={{color:"var(--red)"}}>{blkd}✕</span>}
                    <span style={{color:"var(--text3)",marginLeft:"auto"}}>{rel.length} total</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── FILTER BAR ── */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{position:"relative",flex:1,minWidth:220}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text3)",fontSize:11,pointerEvents:"none"}}>⌕</span>
            <input className="inp" value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))} placeholder="Search ticket, title, owner, drop…" style={{paddingLeft:32}}/>
          </div>
          <select className="inp" value={filter.drop} onChange={e=>setFilter(f=>({...f,drop:e.target.value}))} style={{width:"auto",fontSize:11}}>
            <option value="">All Drops</option>
            {allDrops.map(d=><option key={d} value={d}>{d}</option>)}
          </select>
          {[
            {key:"type",  opts:["All",...TYPE_OPTIONS]},
            {key:"track", opts:["All","feature","hotfix"]},
            {key:"status",opts:["All",...STATUS_OPTIONS]},
          ].map(({key,opts})=>(
            <select key={key} className="inp" value={filter[key]} onChange={e=>setFilter(f=>({...f,[key]:e.target.value}))} style={{width:"auto",fontSize:11}}>
              {opts.map(o=><option key={o}>{o==="All"?`All ${key.charAt(0).toUpperCase()+key.slice(1)}s`:o}</option>)}
            </select>
          ))}
          <select className="inp" value={sort} onChange={e=>setSort(e.target.value)} style={{width:"auto",fontSize:11}}>
            <option value="createdAt">↕ Date</option>
            <option value="drop">↕ Drop</option>
            <option value="priority">↕ Priority</option>
            <option value="type">↕ Type</option>
          </select>
          {/* Export filtered */}
          <button className="btn" onClick={()=>exportToExcel(filtered)} style={{background:"rgba(0,230,118,0.06)",color:"var(--green)",border:"1px solid rgba(0,230,118,0.2)",fontSize:10,padding:"7px 12px",whiteSpace:"nowrap"}}>
            ⬇ EXPORT FILTERED ({filtered.length})
          </button>
        </div>

        {/* ── ACTIVITIES TABLE ── */}
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:4,overflow:"hidden"}}>

          {/* Table header */}
          <div style={{
            display:"grid",gridTemplateColumns:"86px 96px minmax(180px,1fr) 86px 76px 74px 1fr",
            padding:"9px 18px",borderBottom:"1px solid var(--border)",
            background:"var(--bg)",gap:10,
          }}>
            {["DROP","TICKET","TITLE / OWNER","TYPE","PRIORITY","TRACK","PROMOTION PATH"].map(h=>(
              <div key={h} style={{fontSize:8,color:"var(--text3)",fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.14em"}}>{h}</div>
            ))}
          </div>

          {/* Loading */}
          {loading&&items.length===0&&(
            <div style={{padding:56,display:"flex",alignItems:"center",justifyContent:"center",gap:14,color:"var(--text3)",fontFamily:"var(--font-mono)",fontSize:12}}>
              <Spinner size={18}/> LOADING FROM GOOGLE SHEETS…
            </div>
          )}

          {/* Empty */}
          {!loading&&filtered.length===0&&(
            <div style={{padding:64,textAlign:"center"}}>
              <div style={{fontFamily:"var(--font-head)",fontSize:28,color:"var(--text3)",letterSpacing:"0.1em",marginBottom:8}}>NO RECORDS FOUND</div>
              <div style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{items.length===0?"Click ⊕ NEW ACTIVITY to get started":"No results match your current filters"}</div>
            </div>
          )}

          {/* Rows */}
          {filtered.map((item,idx)=>{
            const track     = getTrack(item);
            const isExp     = expanded===item.id;
            const trackColor= track==="feature"?"var(--blue)":"var(--amber)";
            const envEnabled= env=>track==="hotfix"?true:(env==="PROD"||["DEV","QA"].includes(env));
            const typeColor = TYPE_CFG[item.type]?.color||"var(--text)";
            const c         = item.changes||{};
            const hasChanges= c.hasConfig||c.hasCodeChange||c.hasSql;

            return (
              <div key={item.id} className="activity-row" style={{borderBottom:idx<filtered.length-1?"1px solid var(--border)":"none"}}>
                {/* Track indicator stripe */}
                <div className="row-indicator" style={{background:trackColor}}/>

                {/* Main row */}
                <div
                  onClick={()=>setExpanded(isExp?null:item.id)}
                  style={{
                    display:"grid",gridTemplateColumns:"86px 96px minmax(180px,1fr) 86px 76px 74px 1fr",
                    padding:"11px 18px",alignItems:"center",gap:10,
                    background:isExp?"rgba(240,165,0,0.02)":"transparent",
                  }}
                >
                  {/* Drop */}
                  <div style={{color:"var(--amber)",fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,letterSpacing:"0.04em"}}>
                    {item.dropNumber||<span style={{color:"var(--text3)"}}>—</span>}
                  </div>
                  {/* Ticket */}
                  <div style={{color:"var(--text2)",fontFamily:"var(--font-mono)",fontSize:10}}>{item.ticket||"—"}</div>
                  {/* Title */}
                  <div>
                    <div style={{fontFamily:"var(--font-body)",fontWeight:500,fontSize:13,color:"var(--text)",marginBottom:2,lineHeight:1.3}}>
                      {item.title||<em style={{color:"var(--text3)",fontStyle:"italic"}}>Untitled</em>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {item.owner&&<span style={{color:"var(--text3)",fontSize:9,fontFamily:"var(--font-mono)"}}>@{item.owner}</span>}
                      {hasChanges&&(
                        <div style={{display:"flex",gap:4}}>
                          {c.hasConfig&&     <span style={{fontSize:8,color:"var(--purple)",fontFamily:"var(--font-mono)",background:"rgba(170,102,255,0.1)",padding:"1px 5px",borderRadius:1,border:"1px solid rgba(170,102,255,0.2)"}}>CFG</span>}
                          {c.hasCodeChange&& <span style={{fontSize:8,color:"var(--blue)",  fontFamily:"var(--font-mono)",background:"rgba(68,136,255,0.1)", padding:"1px 5px",borderRadius:1,border:"1px solid rgba(68,136,255,0.2)"}}>CODE</span>}
                          {c.hasSql&&        <span style={{fontSize:8,color:"var(--green)", fontFamily:"var(--font-mono)",background:"rgba(0,230,118,0.1)", padding:"1px 5px",borderRadius:1,border:"1px solid rgba(0,230,118,0.2)"}}>SQL</span>}
                        </div>
                      )}
                    </div>
                  </div>
                  {/* Type */}
                  <div style={{color:typeColor,fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,letterSpacing:"0.04em",background:typeColor+"11",border:`1px solid ${typeColor}33`,borderRadius:2,padding:"3px 8px",textAlign:"center"}}>
                    {item.type}
                  </div>
                  {/* Priority */}
                  <div style={{color:pColor[item.priority]||"var(--text2)",fontFamily:"var(--font-mono)",fontSize:10,fontWeight:700,letterSpacing:"0.04em"}}>
                    {item.priority}
                  </div>
                  {/* Track */}
                  <div style={{color:trackColor,fontFamily:"var(--font-mono)",fontSize:9,fontWeight:700,letterSpacing:"0.04em",background:trackColor+"11",border:`1px solid ${trackColor}33`,borderRadius:2,padding:"3px 6px",textAlign:"center"}}>
                    {track==="feature"?"FEAT":"HF/CFG"}
                  </div>
                  {/* Promo path */}
                  <CircuitBar item={item}/>
                </div>

                {/* Expanded section */}
                {isExp&&(
                  <div className="scan-in" style={{borderTop:"1px solid var(--border)",background:"rgba(0,0,0,0.3)",padding:"16px 18px 14px"}}>

                    {/* ENV status grid */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}}>
                      {ENVS.map(env=>{
                        const em=ENV_META[env];
                        const en=envEnabled(env);
                        return (
                          <div key={env} style={{background:en?em.dim+"66":"var(--bg2)",border:`1px solid ${en?em.color+"33":"var(--border)"}`,borderRadius:3,padding:"10px 10px",opacity:en?1:0.25}}>
                            <div style={{color:em.color,fontFamily:"var(--font-mono)",fontWeight:800,fontSize:10,marginBottom:2,letterSpacing:"0.06em"}}>{em.label}</div>
                            <div style={{color:"var(--text3)",fontSize:8,fontFamily:"var(--font-mono)",marginBottom:8}}>{em.sub}</div>
                            <StatusSelect value={item.statuses[env]} onChange={val=>updateStatus(item,env,val)} disabled={!en}/>
                          </div>
                        );
                      })}
                    </div>

                    {/* Change detail cards */}
                    {hasChanges&&(
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:8,marginBottom:12}}>
                        {c.hasConfig&&c.configDetails&&(
                          <div style={{background:"rgba(170,102,255,0.05)",border:"1px solid rgba(170,102,255,0.2)",borderRadius:3,padding:"10px 12px"}}>
                            <div style={{color:"var(--purple)",fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>▸ CONFIG CHANGES</div>
                            <div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"var(--font-mono)"}}>{c.configDetails}</div>
                          </div>
                        )}
                        {c.hasCodeChange&&c.codeDetails&&(
                          <div style={{background:"rgba(68,136,255,0.05)",border:"1px solid rgba(68,136,255,0.2)",borderRadius:3,padding:"10px 12px"}}>
                            <div style={{color:"var(--blue)",fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>▸ CODE CHANGE</div>
                            <div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"var(--font-mono)"}}>{c.codeDetails}</div>
                          </div>
                        )}
                        {c.hasSql&&(
                          <div style={{background:"rgba(0,230,118,0.04)",border:"1px solid rgba(0,230,118,0.18)",borderRadius:3,padding:"10px 12px"}}>
                            <div style={{color:"var(--green)",fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>▸ SQL / DB CHANGES</div>
                            {(c.sqlTypes||[]).length>0&&(
                              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                                {(c.sqlTypes||[]).map(k=>{
                                  const t=SQL_TYPES.find(x=>x.key===k);
                                  return t?<span key={k} style={{fontSize:8,color:t.color,fontFamily:"var(--font-mono)",fontWeight:700,background:t.color+"11",padding:"2px 7px",borderRadius:1,border:`1px solid ${t.color}33`,letterSpacing:"0.05em"}}>{t.label}</span>:null;
                                })}
                              </div>
                            )}
                            {c.sqlDetails&&<div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"var(--font-mono)"}}>{c.sqlDetails}</div>}
                          </div>
                        )}
                      </div>
                    )}

                    {/* Notes */}
                    {item.notes&&(
                      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid var(--border)",borderRadius:3,padding:"8px 12px",marginBottom:12}}>
                        <span style={{color:"var(--text3)",fontSize:8,fontFamily:"var(--font-mono)",fontWeight:700,letterSpacing:"0.1em"}}>▸ NOTES  </span>
                        <span style={{color:"var(--text2)",fontSize:11,fontFamily:"var(--font-mono)"}}>{item.notes}</span>
                      </div>
                    )}

                    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                      <button className="btn btn-ghost" onClick={()=>setModal({mode:"edit",item})} style={{fontSize:10,padding:"5px 12px"}}>✎ EDIT</button>
                      <button className="btn btn-red"   onClick={()=>setDelTarget(item)} style={{fontSize:10,padding:"5px 12px"}}>⊗ DELETE</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-mono)",letterSpacing:"0.1em"}}>
            {filtered.length} OF {items.length} RECORDS · CLICK ROW TO EXPAND
          </div>
          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"var(--font-mono)",letterSpacing:"0.1em"}}>
            ENV TRACKER · BACKED BY GOOGLE SHEETS
          </div>
        </div>
      </div>

      {/* Modals */}
      {modal&&(
        <ItemModal item={modal.item} onSave={handleSave} onClose={()=>setModal(null)} onDelete={modal.mode==="edit"?handleDelete:null} saving={saving}/>
      )}
      {delTarget&&(
        <ConfirmDelete
          title={delTarget.ticket?`${delTarget.dropNumber||""} · ${delTarget.ticket} — ${delTarget.title}`:delTarget.title}
          onConfirm={()=>handleDelete(delTarget.id)}
          onCancel={()=>setDelTarget(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
