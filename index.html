<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AT&T Connection Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --att-blue:#00A8E0; --att-blue-dark:#0057A8; --att-blue-deep:#003F7F;
  --att-blue-lt:#E6F6FC; --att-blue-mid:#B3E5F7;
  --bg:#F2F5F9; --bg2:#FFFFFF; --bg3:#F8FAFC;
  --border:#E2E8F0; --border2:#CBD5E1;
  --shadow:0 1px 3px rgba(0,58,112,0.08),0 4px 16px rgba(0,58,112,0.05);
  --shadow-md:0 4px 16px rgba(0,58,112,0.1),0 2px 6px rgba(0,58,112,0.06);
  --shadow-lg:0 12px 40px rgba(0,58,112,0.14),0 4px 12px rgba(0,58,112,0.08);
  --green:#047857; --green-lt:#ECFDF5; --green-bd:#A7F3D0;
  --red:#DC2626;   --red-lt:#FEF2F2;   --red-bd:#FECACA;
  --amber:#D97706; --amber-lt:#FFFBEB; --amber-bd:#FDE68A;
  --purple:#6D28D9;--purple-lt:#F5F3FF;--purple-bd:#DDD6FE;
  --cyan:#0E7490;  --cyan-lt:#ECFEFF;  --cyan-bd:#A5F3FC;
  --orange:#C2410C;--orange-lt:#FFF7ED;--orange-bd:#FED7AA;
  --text:#0F172A; --text2:#475569; --text3:#94A3B8; --text4:#CBD5E1;
  --sidebar:220px;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
select option{background:#fff;color:var(--text);}
input::placeholder,textarea::placeholder{color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.fade-in{animation:fadeIn .2s ease;}
.slide-in{animation:slideIn .18s ease;}
/* Inputs */
.inp{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;width:100%;transition:border-color .15s,box-shadow .15s;}
.inp:focus{border-color:var(--att-blue);box-shadow:0 0 0 3px rgba(0,168,224,.12);}
.inp-sm{padding:6px 10px;font-size:12px;}
/* Buttons */
.btn{font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:8px;padding:8px 16px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--att-blue);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--att-blue-dark);box-shadow:0 4px 12px rgba(0,168,224,.35);}
.btn-ghost{background:#fff;color:var(--text2);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3);}
.btn-green{background:var(--green-lt);color:var(--green);border:1.5px solid var(--green-bd);}
.btn-green:hover{background:#D1FAE5;}
.btn-red{background:var(--red-lt);color:var(--red);border:1.5px solid var(--red-bd);}
.btn-red:hover{background:#FEE2E2;}
.btn-amber{background:var(--amber-lt);color:var(--amber);border:1.5px solid var(--amber-bd);}
.btn-amber:hover{background:#FEF3C7;}
.btn-purple{background:var(--purple-lt);color:var(--purple);border:1.5px solid var(--purple-bd);}
.btn-purple:hover{background:#EDE9FE;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;}
/* Tab */
.tab{background:none;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;padding:10px 16px;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--att-blue);border-bottom-color:var(--att-blue);}
/* Card */
.card{background:#fff;border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow);}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);border:1.5px solid;}
/* Sidebar */
.sidebar{width:var(--sidebar);background:var(--att-blue-deep);min-height:100vh;position:fixed;left:0;top:0;z-index:50;display:flex;flex-direction:column;transition:width .2s;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;border-radius:8px;margin:2px 8px;transition:all .15s;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-item.active{background:rgba(0,168,224,.3);color:#fff;font-weight:600;}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:var(--mono);}
/* Main layout */
.layout{display:flex;min-height:100vh;}
.main-area{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
/* Topbar */
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,58,112,.06);}
/* Toggle */
.tog-track{width:40px;height:22px;border-radius:11px;position:relative;flex-shrink:0;transition:all .2s;border:1.5px solid;cursor:pointer;}
.tog-thumb{position:absolute;top:2px;width:14px;height:14px;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
/* Row */
.act-row{border-bottom:1.5px solid var(--border);transition:background .1s;cursor:pointer;}
.act-row:hover{background:#F8FBFF;}
/* Status select */
.st-sel{border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;font-family:var(--mono);outline:none;cursor:pointer;border:1.5px solid;width:100%;}
/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
/* Chip */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;font-family:var(--mono);border:1px solid;white-space:nowrap;}
/* Role colors */
.role-dev{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE;}
.role-lead{background:#F5F3FF;color:#6D28D9;border-color:#DDD6FE;}
.role-devops{background:#ECFDF5;color:#047857;border-color:#A7F3D0;}
/* Request card */
.req-card{border-radius:10px;border:1.5px solid;padding:14px 16px;margin-bottom:10px;transition:box-shadow .15s;}
.req-card:hover{box-shadow:var(--shadow-md);}
/* Audit entry */
.audit-entry{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
/* Tooltip-like section label */
.sec{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-family:var(--mono);}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ══ CONSTANTS ══════════════════════════════════════════════════ */
const APP_NAME = "AT&T Connection Manager";
const APP_SHORT = "ACM";

const PRESET_USERS = [
  {id:"u1",name:"Vetrivel Kumar", role:"developer",  avatar:"VK", team:"Platform"},
  {id:"u2",name:"Arun Raj",       role:"developer",  avatar:"AR", team:"Integration"},
  {id:"u3",name:"Sathya Moorthy", role:"developer",  avatar:"SM", team:"Platform"},
  {id:"u4",name:"Priya Nair",     role:"lead",       avatar:"PN", team:"Engineering"},
  {id:"u5",name:"Jordan Blake",   role:"lead",       avatar:"JB", team:"Engineering"},
  {id:"u6",name:"Chris Devlin",   role:"devops",     avatar:"CD", team:"Operations"},
  {id:"u7",name:"Morgan Ops",     role:"devops",     avatar:"MO", team:"Operations"},
  {id:"u8",name:"Admin User",     role:"admin",      avatar:"AU", team:"Management"},
];

const ROLE_META = {
  developer: {label:"Developer",  color:"#1D4ED8", bg:"#EFF6FF", cls:"role-dev",    icon:"💻", can:["create","request_promo"]},
  lead:      {label:"Lead",       color:"#6D28D9", bg:"#F5F3FF", cls:"role-lead",   icon:"👔", can:["approve","reject","create"]},
  devops:    {label:"DevOps",     color:"#047857", bg:"#ECFDF5", cls:"role-devops", icon:"🔧", can:["deploy","complete"]},
  admin:     {label:"Admin",      color:"#B45309", bg:"#FFFBEB", cls:"",            icon:"🔑", can:["all"]},
};

const ENVS = ["DEV","QA","DEV2","QA2","PROD"];
const ENV_META = {
  DEV:  {label:"DEV",  sub:"Feature Branch",  color:"#2563EB",bg:"#EFF6FF",bd:"#BFDBFE",track:"feature"},
  QA:   {label:"QA",   sub:"Feature Testing", color:"#7C3AED",bg:"#F5F3FF",bd:"#DDD6FE",track:"feature"},
  DEV2: {label:"DEV2", sub:"Prod Base",        color:"#D97706",bg:"#FFFBEB",bd:"#FDE68A",track:"hotfix"},
  QA2:  {label:"QA2",  sub:"Hotfix Valid.",    color:"#EA580C",bg:"#FFF7ED",bd:"#FED7AA",track:"hotfix"},
  PROD: {label:"PROD", sub:"Production",       color:"#059669",bg:"#ECFDF5",bd:"#A7F3D0",track:"both"},
};

// Env workflow statuses
const ENV_STATUSES = ["Not Started","Requested","Approved","Rejected","In Progress","Done","Blocked"];
const ENV_STATUS_CFG = {
  "Not Started": {bg:"#F8FAFC",text:"#94A3B8",bd:"#E2E8F0",dot:"#CBD5E1"},
  "Requested":   {bg:"#FFFBEB",text:"#D97706",bd:"#FDE68A",dot:"#D97706"},
  "Approved":    {bg:"#F0FDF4",text:"#16A34A",bd:"#BBF7D0",dot:"#16A34A"},
  "Rejected":    {bg:"#FEF2F2",text:"#DC2626",bd:"#FECACA",dot:"#DC2626"},
  "In Progress": {bg:"#EFF6FF",text:"#2563EB",bd:"#BFDBFE",dot:"#2563EB"},
  "Done":        {bg:"#ECFDF5",text:"#059669",bd:"#A7F3D0",dot:"#059669"},
  "Blocked":     {bg:"#FEF2F2",text:"#DC2626",bd:"#FECACA",dot:"#DC2626"},
};

const TYPE_OPTIONS = ["Feature","Hotfix","Config","Release","Rollback"];
const TYPE_CFG = {
  Feature: {bg:"#EFF6FF",text:"#2563EB",bd:"#BFDBFE"},
  Hotfix:  {bg:"#FFFBEB",text:"#D97706",bd:"#FDE68A"},
  Config:  {bg:"#F5F3FF",text:"#7C3AED",bd:"#DDD6FE"},
  Release: {bg:"#ECFDF5",text:"#059669",bd:"#A7F3D0"},
  Rollback:{bg:"#FEF2F2",text:"#DC2626",bd:"#FECACA"},
};
const SQL_TYPES=[
  {key:"insert",label:"INSERT",color:"#059669",bg:"#ECFDF5",bd:"#A7F3D0"},
  {key:"update",label:"UPDATE",color:"#2563EB",bg:"#EFF6FF",bd:"#BFDBFE"},
  {key:"delete",label:"DELETE",color:"#DC2626",bg:"#FEF2F2",bd:"#FECACA"},
  {key:"modify",label:"MODIFY",color:"#D97706",bg:"#FFFBEB",bd:"#FDE68A"},
  {key:"view",  label:"VIEW",  color:"#7C3AED",bg:"#F5F3FF",bd:"#DDD6FE"},
  {key:"materializedView",label:"MAT. VIEW",color:"#EA580C",bg:"#FFF7ED",bd:"#FED7AA"},
];
const PROMO_PATHS={feature:["DEV","QA","PROD"],hotfix:["DEV2","QA2","PROD","DEV","QA"]};
const SCRIPT_URL_KEY="acm-script-url-v1";
const USER_KEY="acm-current-user";
const getTrack=i=>(i.type==="Hotfix"||i.type==="Config")?"hotfix":"feature";
const EMPTY_CHANGES=()=>({hasConfig:false,configDetails:"",hasCodeChange:false,codeDetails:"",hasSql:false,sqlTypes:[],sqlDetails:""});
const EMPTY_STATUSES=()=>({DEV:"Not Started",QA:"Not Started",DEV2:"Not Started",QA2:"Not Started",PROD:"Not Started"});
const EMPTY_ITEM=(user)=>({
  id:Date.now().toString(36)+Math.random().toString(36).slice(2),
  dropNumber:`D1-${new Date().getFullYear()}`,versionLabel:"",
  ticket:"",title:"",type:"Feature",
  owner:user?.name||"",ownerRole:user?.role||"developer",ownerId:user?.id||"",
  priority:"Medium",notes:"",changes:EMPTY_CHANGES(),microservices:[],
  createdAt:new Date().toISOString().slice(0,10),
  statuses:EMPTY_STATUSES(),
  promotionRequests:[],
  auditLog:[],
});
const PRIO_CFG={
  Critical:{bg:"#FEF2F2",text:"#DC2626",bd:"#FECACA"},
  High:    {bg:"#FFFBEB",text:"#D97706",bd:"#FDE68A"},
  Medium:  {bg:"#EFF6FF",text:"#2563EB",bd:"#BFDBFE"},
  Low:     {bg:"#F8FAFC",text:"#64748B",bd:"#E2E8F0"},
};

const NAV_ITEMS=[
  {id:"dashboard",  icon:"📊", label:"Dashboard"},
  {id:"activities", icon:"📋", label:"Activities"},
  {id:"approvals",  icon:"✅", label:"Approvals",  roles:["lead","admin"]},
  {id:"mywork",     icon:"🔧", label:"My Work",    roles:["devops","admin"]},
  {id:"myrequests", icon:"📤", label:"My Requests",roles:["developer","admin"]},
  {id:"reports",    icon:"📈", label:"Reports"},
  {id:"settings",   icon:"⚙️", label:"Settings"},
];

/* ══ API ════════════════════════════════════════════════════════ */
async function callApi(url,action,payload={}){
  const r=await fetch(url,{method:"POST",body:JSON.stringify({action,payload})});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"API error");
  return j;
}

/* ══ AUDIT HELPER ═══════════════════════════════════════════════ */
function addAudit(item,user,action,detail=""){
  const log=[...(item.auditLog||[]),{at:new Date().toISOString(),by:user?.name||"System",role:user?.role||"",action,detail}];
  return {...item,auditLog:log};
}

/* ══ EXCEL EXPORT ═══════════════════════════════════════════════ */
function exportToExcel(items,label="export"){
  const rows=items.map(i=>{
    const c=i.changes||{};
    const sqlOps=(c.sqlTypes||[]).map(k=>SQL_TYPES.find(t=>t.key===k)?.label||k).join(", ");
    const svcs=(i.microservices||[]).filter(s=>s.name).map(s=>s.name).join(", ");
    const vers=(i.microservices||[]).filter(s=>s.name).map(s=>s.version||"—").join(", ");
    return{
      "Drop":i.dropNumber||"","Version Label":i.versionLabel||"","Ticket":i.ticket||"",
      "Title":i.title||"","Type":i.type||"","Track":getTrack(i)==="feature"?"Feature":"Hotfix/Config",
      "Owner":i.owner||"","Owner Role":i.ownerRole||"","Priority":i.priority||"","Created":i.createdAt||"",
      "Microservices":svcs,"Versions":vers,
      "DEV":i.statuses?.DEV||"","QA":i.statuses?.QA||"","DEV2":i.statuses?.DEV2||"","QA2":i.statuses?.QA2||"","PROD":i.statuses?.PROD||"",
      "Config Change":c.hasConfig?"YES":"NO","Code Change":c.hasCodeChange?"YES":"NO","SQL Change":c.hasSql?"YES":"NO","SQL Ops":sqlOps,
      "Notes":i.notes||"",
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:10},{wch:13},{wch:13},{wch:36},{wch:10},{wch:14},{wch:16},{wch:12},{wch:10},{wch:12},{wch:28},{wch:20},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:20},{wch:36}];
  const range=XLSX.utils.decode_range(ws["!ref"]);
  for(let C=range.s.c;C<=range.e.c;C++){
    const a=XLSX.utils.encode_cell({r:0,c:C});
    if(ws[a]) ws[a].s={font:{bold:true,color:{rgb:"003F7F"},sz:11},fill:{fgColor:{rgb:"E6F6FC"}},alignment:{horizontal:"center",wrapText:true}};
  }
  // Services sheet
  const svcRows=[["Drop","Version Label","Ticket","Title","Service Name","Version","DEV Status","QA Status","PROD Status"]];
  items.forEach(i=>(i.microservices||[]).filter(s=>s.name).forEach(s=>{
    svcRows.push([i.dropNumber||"",i.versionLabel||"",i.ticket||"",i.title||"",s.name||"",s.version||"",i.statuses?.DEV||"",i.statuses?.QA||"",i.statuses?.PROD||""]);
  }));
  const wsSvc=XLSX.utils.aoa_to_sheet(svcRows);
  wsSvc["!cols"]=[{wch:10},{wch:13},{wch:13},{wch:34},{wch:26},{wch:14},{wch:14},{wch:14},{wch:14}];
  // Approvals sheet
  const aprRows=[["Drop","Ticket","Title","Environment","Requested By","Requested At","Reviewed By","Decision","Comment","Deployed By","Deployed At"]];
  items.forEach(i=>(i.promotionRequests||[]).forEach(r=>{
    aprRows.push([i.dropNumber||"",i.ticket||"",i.title||"",r.env||"",r.requestedBy?.name||"",r.requestedAt?.slice(0,16)||"",r.reviewedBy?.name||"",r.status||"",r.comment||"",r.deployedBy?.name||"",r.deployedAt?.slice(0,16)||""]);
  }));
  const wsApr=XLSX.utils.aoa_to_sheet(aprRows);
  wsApr["!cols"]=[{wch:10},{wch:13},{wch:32},{wch:8},{wch:16},{wch:18},{wch:16},{wch:12},{wch:30},{wch:16},{wch:18}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Activities");
  XLSX.utils.book_append_sheet(wb,wsSvc,"Microservices");
  XLSX.utils.book_append_sheet(wb,wsApr,"Approval Log");
  XLSX.writeFile(wb,`ACM-${label}-${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ══ ATOMS ══════════════════════════════════════════════════════ */
function Spinner({size=14}){return <span style={{display:"inline-block",width:size,height:size,border:"2px solid #E2E8F0",borderTopColor:"var(--att-blue)",borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}}/>;}

function Avatar({user,size=32}){
  const rm=ROLE_META[user?.role]||ROLE_META.developer;
  return <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${rm.color},${rm.color}88)`,color:"#fff",fontWeight:700,fontSize:size*.35,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"var(--mono)"}}>{user?.avatar||"?"}</div>;
}

function RoleBadge({role}){
  const rm=ROLE_META[role]||ROLE_META.developer;
  return <span className={`chip ${rm.cls||""}`} style={{background:rm.bg,color:rm.color,borderColor:rm.color+"33"}}>{rm.icon} {rm.label}</span>;
}

function StatusBadge({value}){
  const c=ENV_STATUS_CFG[value]||ENV_STATUS_CFG["Not Started"];
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:600,fontFamily:"var(--mono)",background:c.bg,color:c.text,border:`1.5px solid ${c.bd}`,whiteSpace:"nowrap"}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:c.dot,display:"inline-block",flexShrink:0}}/>
    {value}
  </span>;
}

function Toggle({checked,onChange,label,accent="var(--att-blue)"}){
  return <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",userSelect:"none"}} onClick={()=>onChange(!checked)}>
    <div className="tog-track" style={{background:checked?accent+"18":"#F1F5F9",borderColor:checked?accent+"55":"#E2E8F0"}}>
      <div className="tog-thumb" style={{left:checked?22:2,background:checked?accent:"#94A3B8"}}/>
    </div>
    <span style={{fontSize:13,color:checked?accent:"var(--text2)",fontWeight:checked?600:400}}>{label}</span>
  </div>;
}

function PromoBar({item}){
  const track=getTrack(item),path=PROMO_PATHS[track];
  return <div style={{display:"flex",alignItems:"center",gap:2,flexWrap:"nowrap"}}>
    {path.map((env,i)=>{
      const em=ENV_META[env],sc=ENV_STATUS_CFG[item.statuses[env]]||ENV_STATUS_CFG["Not Started"];
      const icons={"Done":"✓","Blocked":"✕","In Progress":"▶","Requested":"⏳","Approved":"✔","Rejected":"✗"};
      const isReturn=track==="hotfix"&&i===3;
      return <React.Fragment key={env}>
        {isReturn&&<span style={{color:"#D97706",fontSize:9,margin:"0 1px",fontWeight:700}}>↺</span>}
        <div style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:10,background:sc.bg,border:`1.5px solid ${sc.bd}`,fontSize:9,fontWeight:700,fontFamily:"var(--mono)"}}>
          <span style={{color:em.color}}>{env}</span>
          <span style={{color:sc.text}}>{icons[item.statuses[env]]||"○"}</span>
        </div>
        {i<path.length-1&&!isReturn&&<span style={{color:"#CBD5E1",fontSize:9,flexShrink:0}}>→</span>}
      </React.Fragment>;
    })}
  </div>;
}

/* ══ CHANGES SECTION ════════════════════════════════════════════ */
function ChangesSection({changes,setChanges}){
  const set=(k,v)=>setChanges({...changes,[k]:v});
  const toggleSql=k=>{const cur=changes.sqlTypes||[];setChanges({...changes,sqlTypes:cur.includes(k)?cur.filter(x=>x!==k):[...cur,k]});};
  const block=(key,label,accent,children)=>{
    const on=changes[key];
    return <div style={{background:on?accent+"06":"#FAFBFC",border:`1.5px solid ${on?accent+"30":"#E2E8F0"}`,borderRadius:10,marginBottom:10,overflow:"hidden",transition:"all .2s"}}>
      <div style={{padding:"12px 16px",borderBottom:on?"1px solid #F1F5F9":"none",background:on?accent+"04":"transparent"}}>
        <Toggle checked={!!on} onChange={v=>set(key,v)} label={label} accent={accent}/>
      </div>
      {on&&<div style={{padding:"14px 16px"}}>{children}</div>}
    </div>;
  };
  return <div>
    {block("hasConfig","Config Changes","#7C3AED",
      <textarea className="inp" value={changes.configDetails||""} onChange={e=>set("configDetails",e.target.value)} placeholder={"Config keys/values\nFeature flags, env settings…"} rows={3} style={{resize:"vertical",fontSize:12,lineHeight:1.7}}/>
    )}
    {block("hasCodeChange","Code Change","#2563EB",
      <textarea className="inp" value={changes.codeDetails||""} onChange={e=>set("codeDetails",e.target.value)} placeholder={"Modules/services changed\nPR links, branch names…"} rows={3} style={{resize:"vertical",fontSize:12,lineHeight:1.7}}/>
    )}
    {block("hasSql","SQL / DB Changes","#059669",
      <div>
        <div className="sec" style={{marginBottom:8}}>Operation Types</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {SQL_TYPES.map(t=>{const on=(changes.sqlTypes||[]).includes(t.key);return <div key={t.key} onClick={()=>toggleSql(t.key)} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"5px 12px",borderRadius:20,fontSize:11,fontFamily:"var(--mono)",fontWeight:600,cursor:"pointer",border:`1.5px solid ${on?t.bd:"#E2E8F0"}`,background:on?t.bg:"#fff",color:on?t.color:"#94A3B8",transition:"all .15s"}}>
            {on&&<span style={{fontSize:9}}>✓</span>}{t.label}
          </div>;})}
        </div>
        <div className="sec" style={{marginBottom:6}}>Details</div>
        <textarea className="inp" value={changes.sqlDetails||""} onChange={e=>set("sqlDetails",e.target.value)} placeholder={"• Tables affected\n• Script filenames\n• Rollback plan"} rows={3} style={{resize:"vertical",fontSize:12,lineHeight:1.7}}/>
      </div>
    )}
  </div>;
}

/* ══ WORKFLOW / APPROVALS SECTION ═══════════════════════════════ */
function WorkflowSection({item,user,onUpdateItem}){
  const [reqEnv,setReqEnv]=useState("DEV");
  const [reqNote,setReqNote]=useState("");
  const [rejectComment,setRejectComment]=useState("");
  const [showReject,setShowReject]=useState(null); // requestId

  const track=getTrack(item);
  const validEnvs=track==="feature"?["DEV","QA","PROD"]:["DEV2","QA2","PROD","DEV","QA"];
  const pendingRequests=(item.promotionRequests||[]).filter(r=>r.status==="pending");
  const canRequest=ROLE_META[user?.role]?.can?.includes("request_promo")||user?.role==="admin";
  const canApprove=ROLE_META[user?.role]?.can?.includes("approve")||user?.role==="admin";
  const canDeploy =ROLE_META[user?.role]?.can?.includes("deploy")||user?.role==="admin";

  const raiseRequest=()=>{
    if(!reqEnv) return;
    const req={id:Date.now().toString(36),env:reqEnv,status:"pending",requestedBy:{id:user.id,name:user.name,role:user.role},requestedAt:new Date().toISOString(),comment:reqNote,reviewedBy:null,reviewedAt:null,deployedBy:null,deployedAt:null,deployComment:""};
    let updated={...item,promotionRequests:[...(item.promotionRequests||[]),req]};
    updated=addAudit(updated,user,`Requested promotion to ${reqEnv}`,reqNote);
    updated={...updated,statuses:{...updated.statuses,[reqEnv]:"Requested"}};
    onUpdateItem(updated);setReqNote("");
  };

  const approve=(reqId)=>{
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"approved",reviewedBy:{id:user.id,name:user.name,role:user.role},reviewedAt:new Date().toISOString()}:r)};
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const withAudit=addAudit({...updated,statuses:{...updated.statuses,[req.env]:"Approved"}},user,`Approved promotion to ${req.env}`);
    onUpdateItem(withAudit);
  };

  const reject=(reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"rejected",reviewedBy:{id:user.id,name:user.name,role:user.role},reviewedAt:new Date().toISOString(),rejectComment}:r)};
    const withAudit=addAudit({...updated,statuses:{...updated.statuses,[req.env]:"Rejected"}},user,`Rejected promotion to ${req.env}`,rejectComment);
    onUpdateItem(withAudit);setShowReject(null);setRejectComment("");
  };

  const pickup=(reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"in_progress",assignedTo:{id:user.id,name:user.name,role:user.role},pickedAt:new Date().toISOString()}:r)};
    const withAudit=addAudit({...updated,statuses:{...updated.statuses,[req.env]:"In Progress"}},user,`Picked up deployment to ${req.env}`);
    onUpdateItem(withAudit);
  };

  const complete=(reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"done",deployedBy:{id:user.id,name:user.name,role:user.role},deployedAt:new Date().toISOString()}:r)};
    const withAudit=addAudit({...updated,statuses:{...updated.statuses,[req.env]:"Done"}},user,`Completed deployment to ${req.env}`);
    onUpdateItem(withAudit);
  };

  const reqStatusIcon={"pending":"⏳","approved":"✅","rejected":"❌","in_progress":"🔄","done":"✅"};
  const reqStatusColor={"pending":"#D97706","approved":"#16A34A","rejected":"#DC2626","in_progress":"#2563EB","done":"#059669"};

  return <div>
    {/* Raise request (developers) */}
    {canRequest&&<div style={{background:"#F0F9FF",border:"1.5px solid #BAE6FD",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,color:"#0369A1",marginBottom:10}}>📤 Raise Promotion Request</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr auto",gap:10,alignItems:"end"}}>
        <div>
          <div className="sec" style={{marginBottom:4}}>Target Environment</div>
          <select className="inp inp-sm" value={reqEnv} onChange={e=>setReqEnv(e.target.value)}>
            {validEnvs.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
        <div>
          <div className="sec" style={{marginBottom:4}}>Note (optional)</div>
          <input className="inp inp-sm" value={reqNote} onChange={e=>setReqNote(e.target.value)} placeholder="Why is this ready for promotion?"/>
        </div>
        <button className="btn btn-primary btn-sm" onClick={raiseRequest}>Request →</button>
      </div>
    </div>}

    {/* All requests */}
    <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>Promotion Requests</div>
    {(item.promotionRequests||[]).length===0&&<div style={{color:"var(--text3)",fontSize:12,padding:"16px 0",textAlign:"center",border:"2px dashed #E2E8F0",borderRadius:8}}>No promotion requests yet.</div>}
    {[...(item.promotionRequests||[])].reverse().map(req=>{
      const em=ENV_META[req.env]||ENV_META.DEV;
      const statusColor=reqStatusColor[req.status]||"#64748B";
      const canAct_approve=canApprove&&req.status==="pending";
      const canAct_pickup =canDeploy&&req.status==="approved";
      const canAct_complete=canDeploy&&req.status==="in_progress";
      return <div key={req.id} className="req-card" style={{background:req.status==="done"?"#F0FDF4":req.status==="rejected"?"#FEF2F2":"#FAFBFC",borderColor:req.status==="done"?"#A7F3D0":req.status==="rejected"?"#FECACA":"#E2E8F0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{background:em.bg,border:`1.5px solid ${em.bd}`,borderRadius:6,padding:"4px 10px",fontFamily:"var(--mono)",fontWeight:700,fontSize:12,color:em.color}}>{req.env}</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:statusColor}}>{reqStatusIcon[req.status]} {req.status?.replace("_"," ").toUpperCase()}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>by <strong>{req.requestedBy?.name}</strong> · {new Date(req.requestedAt).toLocaleString()}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {canAct_approve&&<>
              <button className="btn btn-green btn-sm" onClick={()=>approve(req.id)}>✓ Approve</button>
              {showReject===req.id
                ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input className="inp inp-sm" value={rejectComment} onChange={e=>setRejectComment(e.target.value)} placeholder="Reason..." style={{width:180}}/>
                    <button className="btn btn-red btn-sm" onClick={()=>reject(req.id)}>Reject</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setShowReject(null)}>✕</button>
                  </div>
                :<button className="btn btn-red btn-sm" onClick={()=>setShowReject(req.id)}>✕ Reject</button>
              }
            </>}
            {canAct_pickup&&<button className="btn btn-amber btn-sm" onClick={()=>pickup(req.id)}>🔧 Pick Up</button>}
            {canAct_complete&&<button className="btn btn-green btn-sm" onClick={()=>complete(req.id)}>✓ Mark Done</button>}
          </div>
        </div>
        {req.comment&&<div style={{marginTop:8,fontSize:11,color:"var(--text2)",background:"#fff",padding:"6px 10px",borderRadius:6,border:"1px solid #E2E8F0"}}>💬 {req.comment}</div>}
        {req.reviewedBy&&<div style={{marginTop:6,fontSize:10,color:"var(--text3)"}}>Reviewed by <strong>{req.reviewedBy.name}</strong> at {new Date(req.reviewedAt).toLocaleString()}</div>}
        {req.deployedBy&&<div style={{marginTop:4,fontSize:10,color:"#059669"}}>Deployed by <strong>{req.deployedBy.name}</strong> at {new Date(req.deployedAt).toLocaleString()}</div>}
      </div>;
    })}
  </div>;
}

/* ══ AUDIT LOG ══════════════════════════════════════════════════ */
function AuditLog({item}){
  const log=[...(item.auditLog||[])].reverse();
  const roleColor={developer:"#2563EB",lead:"#7C3AED",devops:"#059669",admin:"#B45309"};
  if(log.length===0) return <div style={{color:"var(--text3)",fontSize:12,textAlign:"center",padding:"24px 0"}}>No audit history yet.</div>;
  return <div>{log.map((e,i)=><div key={i} className="audit-entry">
    <div className="audit-dot" style={{background:roleColor[e.role]||"#94A3B8"}}/>
    <div style={{flex:1}}>
      <div style={{fontSize:12,color:"var(--text)"}}><strong style={{color:roleColor[e.role]||"var(--text2)"}}>{e.by}</strong> — {e.action}</div>
      {e.detail&&<div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{e.detail}</div>}
      <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{new Date(e.at).toLocaleString()}</div>
    </div>
  </div>)}</div>;
}

function ConfirmDelete({title,onConfirm,onCancel}){

    <div className="scale-in" style={{maxWidth:420,width:"100%",background:"#fff",borderRadius:16,padding:32,boxShadow:"var(--shadow-lg)",border:"1.5px solid #FECACA"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"#FEF2F2",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:22,border:"2px solid #FECACA"}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:8}}>Confirm Deletion</div>
        <div style={{color:"var(--text2)",fontSize:13,marginBottom:12}}>This action is permanent and cannot be undone.</div>
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",color:"#DC2626",fontSize:12,fontFamily:"var(--mono)",lineHeight:1.5}}>{title||"Untitled"}</div>

/* ══ ITEM MODAL ═════════════════════════════════════════════════ */
function ItemModal({item,user,onSave,onClose,onDelete,saving}){

/* ══ LOGIN SCREEN ═══════════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const [selected,setSelected]=useState(null);
  const [step,setStep]=useState("select"); // select | url
  const [url,setUrl]=useState(()=>localStorage.getItem(SCRIPT_URL_KEY)||"");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");

  const proceed=async()=>{
    if(!url.trim()){setErr("Script URL required.");return;}
    setBusy(true);setErr("");
    try{const r=await fetch(url.trim()+"?action=getAll");const j=await r.json();
      if(j.ok!==undefined){localStorage.setItem(SCRIPT_URL_KEY,url.trim());onLogin(selected,url.trim());}
      else setErr("Could not connect. Check deployment.");
    }catch{setErr("Cannot reach script. Verify URL.");}
    setBusy(false);
  };

  const alreadyHasUrl=!!localStorage.getItem(SCRIPT_URL_KEY);

  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#003F7F 0%,#0057A8 40%,#00A8E0 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

          <div style={{color:"#fff"}}>
            <div style={{fontWeight:800,fontSize:16,lineHeight:1}}>{APP_NAME}</div>
            <div style={{fontSize:10,opacity:.7,letterSpacing:"0.1em",marginTop:2}}>{APP_SHORT} · PIPELINE CONTROL</div>

                <Avatar user={u} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
                  <div style={{fontSize:11,color:"var(--text3)"}}>{u.team}</div>
                </div>
                <RoleBadge role={u.role}/>
                {isSel&&<span style={{color:"var(--att-blue)",fontSize:16}}>✓</span>}

          </div>

/* ══ ACTIVITIES PAGE ════════════════════════════════════════════ */
function ActivitiesPage({items,user,onNew,onEdit,onDelete,onStatusUpdate,filter,setFilter,sort,setSort}){
  const [delTarget,setDelTarget]=useState(null);
  const [expanded,setExpanded]=useState(null);

  const allDrops=[...new Set(items.map(i=>i.dropNumber).filter(Boolean))].sort();
  const filtered=items.filter(i=>{
    const t=getTrack(i);
    if(filter.type!=="All"&&i.type!==filter.type) return false;
    if(filter.track!=="All"&&t!==filter.track)    return false;
    if(filter.status!=="All"&&!Object.values(i.statuses).includes(filter.status)) return false;
    if(filter.drop&&i.dropNumber!==filter.drop)   return false;
    if(filter.search){const q=filter.search.toLowerCase();if(![i.ticket,i.title,i.owner,i.dropNumber,i.versionLabel].some(f=>f?.toLowerCase().includes(q)))return false;}
    return true;
  }).sort((a,b)=>{
    if(sort==="priority")return["Critical","High","Medium","Low"].indexOf(a.priority)-["Critical","High","Medium","Low"].indexOf(b.priority);
    if(sort==="type")return a.type.localeCompare(b.type);
    if(sort==="drop")return(a.dropNumber||"").localeCompare(b.dropNumber||"");
    return b.createdAt.localeCompare(a.createdAt);
  });

  return <div style={{padding:"24px 28px"}}>

                {c.hasCodeChange&&<span style={{fontSize:9,fontWeight:700,fontFamily:"var(--mono)",background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",padding:"1px 5px",borderRadius:3}}>CODE</span>}
                {c.hasSql&&       <span style={{fontSize:9,fontWeight:700,fontFamily:"var(--mono)",background:"#ECFDF5",color:"#059669",border:"1px solid #A7F3D0",padding:"1px 5px",borderRadius:3}}>SQL</span>}
                {pendingReqs>0&&  <span style={{fontSize:9,fontWeight:700,fontFamily:"var(--mono)",background:"#FFFBEB",color:"#D97706",border:"1px solid #FDE68A",padding:"1px 5px",borderRadius:3}}>⏳{pendingReqs}</span>}
              </div>
            </div>
            {/* Owner (separate column) */}
            <div>
              {item.owner?<>
                <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{item.owner}</div>

            {/* Microservices (separate column) */}
            <div>{svcs.length===0?<span style={{color:"var(--text4)",fontSize:11}}>—</span>:
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {svcs.slice(0,2).map(s=><span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"1px 7px",background:"#F0FDFA",border:"1px solid #99F6E4",borderRadius:10,fontSize:10,fontFamily:"var(--mono)",fontWeight:500,whiteSpace:"nowrap"}}>
                  <span style={{color:"var(--text2)"}}>{s.name}</span>
                  {s.version&&<><span style={{color:"#CBD5E1"}}>@</span><span style={{color:"#0E7490",fontWeight:700}}>{s.version}</span></>}
                </span>)}
                {svcs.length>2&&<span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>+{svcs.length-2} more</span>}
              </div>}
            </div>
            {/* Type */}
            <div><span style={{display:"inline-block",padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:600,fontFamily:"var(--mono)",background:tc.bg,color:tc.text,border:`1px solid ${tc.bd}`}}>{item.type}</span></div>
            {/* Priority */}
            <div><span style={{display:"inline-block",padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:600,fontFamily:"var(--mono)",background:pc.bg,color:pc.text,border:`1px solid ${pc.bd}`}}>{item.priority}</span></div>
            {/* Track */}
            <div><span style={{display:"inline-block",padding:"3px 7px",borderRadius:6,fontSize:9,fontWeight:700,fontFamily:"var(--mono)",background:track==="feature"?"#EFF6FF":"#FFFBEB",color:trackColor,border:`1px solid ${track==="feature"?"#BFDBFE":"#FDE68A"}`}}>{track==="feature"?"FEAT":"HF/CFG"}</span></div>
            {/* Promo */}
            <PromoBar item={item}/>
          </div>

          {isExp&&<div className="fade-in" style={{borderTop:"1.5px solid var(--border)",padding:"16px 20px",background:"#F8FBFF"}}>
            {/* Env grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
              {ENVS.map(env=>{
                const em=ENV_META[env],en=envEnabled(env);
                const sc=ENV_STATUS_CFG[item.statuses[env]]||ENV_STATUS_CFG["Not Started"];
                return <div key={env} style={{background:en?em.bg:"#F8FAFC",border:`1.5px solid ${en?em.bd:"#E2E8F0"}`,borderRadius:10,padding:"12px",opacity:en?1:0.3}}>
                  <div style={{color:em.color,fontFamily:"var(--mono)",fontWeight:700,fontSize:11,marginBottom:1}}>{em.label}</div>
                  <div style={{color:"var(--text3)",fontSize:9,fontFamily:"var(--mono)",marginBottom:8}}>{em.sub}</div>
                  <StatusBadge value={item.statuses[env]}/>
                </div>;
              })}
            </div>
            {/* All services */}
            {svcs.length>0&&<div style={{marginBottom:12,padding:"10px 14px",background:"#F0FDFA",border:"1px solid #99F6E4",borderRadius:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#0E7490",fontFamily:"var(--mono)",marginBottom:8}}>▸ MICROSERVICES</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {svcs.map(s=><span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 12px",background:"#fff",border:"1px solid #99F6E4",borderRadius:20,fontSize:11,fontFamily:"var(--mono)"}}>
                  <span style={{fontWeight:600,color:"var(--text2)"}}>{s.name}</span>
                  {s.version&&<><span style={{color:"#CBD5E1"}}>@</span><span style={{fontWeight:700,color:"#0E7490"}}>{s.version}</span></>}
                </span>)}
              </div>
            </div>}
            {/* Change cards */}
            {(c.hasConfig||c.hasCodeChange||c.hasSql)&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:8,marginBottom:12}}>
              {c.hasConfig&&c.configDetails&&<div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",borderRadius:8,padding:"10px 14px"}}><div style={{color:"#7C3AED",fontSize:9,fontWeight:700,fontFamily:"var(--mono)",marginBottom:6}}>▸ CONFIG</div><div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.7,fontFamily:"var(--mono)"}}>{c.configDetails}</div></div>}
              {c.hasCodeChange&&c.codeDetails&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"10px 14px"}}><div style={{color:"#2563EB",fontSize:9,fontWeight:700,fontFamily:"var(--mono)",marginBottom:6}}>▸ CODE</div><div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.7,fontFamily:"var(--mono)"}}>{c.codeDetails}</div></div>}
              {c.hasSql&&<div style={{background:"#ECFDF5",border:"1px solid #A7F3D0",borderRadius:8,padding:"10px 14px"}}><div style={{color:"#059669",fontSize:9,fontWeight:700,fontFamily:"var(--mono)",marginBottom:6}}>▸ SQL/DB</div>{(c.sqlTypes||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>{(c.sqlTypes||[]).map(k=>{const t=SQL_TYPES.find(x=>x.key===k);return t?<span key={k} style={{fontSize:9,fontWeight:700,fontFamily:"var(--mono)",background:t.bg,color:t.color,border:`1px solid ${t.bd}`,padding:"2px 6px",borderRadius:3}}>{t.label}</span>:null;})}</div>}{c.sqlDetails&&<div style={{color:"var(--text2)",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.7,fontFamily:"var(--mono)"}}>{c.sqlDetails}</div>}</div>}
            </div>}
            {item.notes&&<div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:"8px 14px",marginBottom:12}}><span style={{color:"var(--text3)",fontSize:9,fontWeight:700,fontFamily:"var(--mono)"}}>▸ NOTES  </span><span style={{color:"var(--text2)",fontSize:12}}>{item.notes}</span></div>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>onEdit(item)}>✎ Edit</button>
              <button className="btn btn-red btn-sm" onClick={()=>setDelTarget(item)}>🗑 Delete</button>
            </div>
          </div>}
        </div>;
      })}
    </div>

    <div style={{marginTop:10,fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>{filtered.length} of {items.length} records · Click row to expand</div>
    {delTarget&&<ConfirmDelete title={delTarget.ticket?`${delTarget.dropNumber||""} · ${delTarget.ticket} — ${delTarget.title}`:delTarget.title} onConfirm={()=>{onDelete(delTarget.id);setDelTarget(null);}} onCancel={()=>setDelTarget(null)}/>}
  </div>;
}

/* ══ APPROVALS PAGE ═════════════════════════════════════════════ */
function ApprovalsPage({items,user,onUpdateItem}){
  const pending=items.flatMap(i=>(i.promotionRequests||[]).filter(r=>r.status==="pending").map(r=>({...r,item:i})));
  const [rejectId,setRejectId]=useState(null);
  const [rejectComment,setRejectComment]=useState("");

  const approve=(item,reqId)=>{
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"approved",reviewedBy:{id:user.id,name:user.name,role:user.role},reviewedAt:new Date().toISOString()}:r)};
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    onUpdateItem(addAudit({...updated,statuses:{...updated.statuses,[req.env]:"Approved"}},user,`Approved promotion to ${req.env}`));
  };
  const reject=(item,reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const updated={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"rejected",reviewedBy:{id:user.id,name:user.name,role:user.role},reviewedAt:new Date().toISOString(),rejectComment}:r)};
    onUpdateItem(addAudit({...updated,statuses:{...updated.statuses,[req.env]:"Rejected"}},user,`Rejected promotion to ${req.env}`,rejectComment));
    setRejectId(null);setRejectComment("");
  };

  return <div style={{padding:"24px 28px"}}>
    <h1 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Approvals</h1>
    <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>{pending.length} pending request{pending.length!==1?"s":""} awaiting your review</div>
    {pending.length===0&&<div className="card" style={{padding:48,textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:12}}>✅</div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>All caught up!</div>
      <div style={{fontSize:12,color:"var(--text3)"}}>No pending promotion requests at this time.</div>
    </div>}
    {pending.map(({item,...req})=>{
      const em=ENV_META[req.env]||ENV_META.DEV;
      const tc=TYPE_CFG[item.type]||TYPE_CFG.Feature;
      return <div key={req.id} className="card" style={{padding:"18px 20px",marginBottom:12,borderLeft:`4px solid ${em.color}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div style={{flex:1,minWidth:280}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:11,color:"#D97706"}}>{item.dropNumber}</span>
              {item.versionLabel&&<span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--att-blue)"}}>{item.versionLabel}</span>}
              <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{item.ticket||"No ticket"}</span>
              <span style={{background:tc.bg,color:tc.text,border:`1px solid ${tc.bd}`,borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"var(--mono)"}}>{item.type}</span>
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{item.title||"Untitled"}</div>
            <div style={{display:"flex",alignItems:"center",gap:12,fontSize:12,color:"var(--text2)"}}>
              <span>👤 {req.requestedBy?.name}</span>
              <RoleBadge role={req.requestedBy?.role}/>
              <span>🕐 {new Date(req.requestedAt).toLocaleString()}</span>
            </div>
            {req.comment&&<div style={{marginTop:8,fontSize:12,background:"#F8FAFC",border:"1px solid var(--border)",borderRadius:6,padding:"6px 10px",color:"var(--text2)"}}>💬 {req.comment}</div>}
            <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Requesting promotion to:</span>
              <div style={{background:em.bg,border:`1.5px solid ${em.bd}`,borderRadius:8,padding:"4px 14px",fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:em.color}}>{req.env}</div>
            </div>
            {/* Mini promo path */}
            <div style={{marginTop:8}}><PromoBar item={item}/></div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,minWidth:160}}>
            <button className="btn btn-green" onClick={()=>approve(item,req.id)} style={{justifyContent:"center"}}>✓ Approve for {req.env}</button>
            {rejectId===req.id
              ?<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <input className="inp inp-sm" value={rejectComment} onChange={e=>setRejectComment(e.target.value)} placeholder="Rejection reason…"/>
                  <div style={{display:"flex",gap:6}}>
                    <button className="btn btn-red btn-sm" onClick={()=>reject(item,req.id)} style={{flex:1,justifyContent:"center"}}>Reject</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setRejectId(null)}>✕</button>
                  </div>
                </div>
              :<button className="btn btn-red" onClick={()=>setRejectId(req.id)} style={{justifyContent:"center"}}>✕ Reject</button>
            }
          </div>
        </div>
        {/* Microservices summary */}
        {(item.microservices||[]).filter(s=>s.name).length>0&&<div style={{marginTop:12,paddingTop:10,borderTop:"1px solid var(--border)",display:"flex",flexWrap:"wrap",gap:6}}>
          <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",marginRight:4}}>SERVICES:</span>
          {(item.microservices||[]).filter(s=>s.name).map(s=><span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 9px",background:"#F0FDFA",border:"1px solid #99F6E4",borderRadius:12,fontSize:10,fontFamily:"var(--mono)"}}>
            <span style={{color:"var(--text2)",fontWeight:600}}>{s.name}</span>
            {s.version&&<><span style={{color:"#CBD5E1"}}>@</span><span style={{color:"#0E7490",fontWeight:700}}>{s.version}</span></>}
          </span>)}
        </div>}
      </div>;
    })}
  </div>;
}

/* ══ MY WORK PAGE (DevOps) ══════════════════════════════════════ */
function MyWorkPage({items,user,onUpdateItem}){
  const tasks=items.flatMap(i=>(i.promotionRequests||[]).filter(r=>r.status==="approved"||r.status==="in_progress").map(r=>({...r,item:i})));
  const pickup=(item,reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const up={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"in_progress",assignedTo:{id:user.id,name:user.name},pickedAt:new Date().toISOString()}:r)};
    onUpdateItem(addAudit({...up,statuses:{...up.statuses,[req.env]:"In Progress"}},user,`Picked up deployment to ${req.env}`));
  };
  const complete=(item,reqId)=>{
    const req=(item.promotionRequests||[]).find(r=>r.id===reqId);
    const up={...item,promotionRequests:(item.promotionRequests||[]).map(r=>r.id===reqId?{...r,status:"done",deployedBy:{id:user.id,name:user.name},deployedAt:new Date().toISOString()}:r)};
    onUpdateItem(addAudit({...up,statuses:{...up.statuses,[req.env]:"Done"}},user,`Completed deployment to ${req.env}`));
  };

  return <div style={{padding:"24px 28px"}}>
    <h1 style={{fontSize:20,fontWeight:800,marginBottom:4}}>My Work Queue</h1>
    <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>{tasks.length} deployment task{tasks.length!==1?"s":""} ready</div>
    {tasks.length===0&&<div className="card" style={{padding:48,textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:12}}>🎉</div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Queue is clear!</div>
      <div style={{fontSize:12,color:"var(--text3)"}}>No deployment tasks assigned or approved.</div>
    </div>}
    {tasks.map(({item,...req})=>{
      const em=ENV_META[req.env]||ENV_META.DEV;
      const isInProgress=req.status==="in_progress";
      return <div key={req.id} className="card" style={{padding:"18px 20px",marginBottom:12,borderLeft:`4px solid ${isInProgress?"#2563EB":"#16A34A"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:11,color:"#D97706"}}>{item.dropNumber}</span>
              {item.versionLabel&&<span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--att-blue)"}}>{item.versionLabel}</span>}
              <span style={{background:isInProgress?"#EFF6FF":"#F0FDF4",color:isInProgress?"#2563EB":"#16A34A",border:`1px solid ${isInProgress?"#BFDBFE":"#BBF7D0"}`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,fontFamily:"var(--mono)"}}>{isInProgress?"🔄 IN PROGRESS":"✅ APPROVED"}</span>
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{item.title||"Untitled"}</div>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>Requested by <strong>{req.requestedBy?.name}</strong></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Target:</span>
              <div style={{background:em.bg,border:`1.5px solid ${em.bd}`,borderRadius:8,padding:"4px 14px",fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:em.color}}>{req.env}</div>
            </div>
            {(item.microservices||[]).filter(s=>s.name).length>0&&<div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:5}}>
              {(item.microservices||[]).filter(s=>s.name).map(s=><span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 9px",background:"#F0FDFA",border:"1px solid #99F6E4",borderRadius:12,fontSize:10,fontFamily:"var(--mono)"}}>
                <span style={{color:"var(--text2)",fontWeight:600}}>{s.name}</span>
                {s.version&&<><span style={{color:"#CBD5E1"}}>@</span><span style={{color:"#0E7490",fontWeight:700}}>{s.version}</span></>}
              </span>)}
            </div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {!isInProgress&&<button className="btn btn-amber" onClick={()=>pickup(item,req.id)}>🔧 Pick Up</button>}
            {isInProgress&&<button className="btn btn-green" onClick={()=>complete(item,req.id)}>✓ Mark Done</button>}
          </div>
        </div>
      </div>;
    })}
  </div>;
}

/* ══ MY REQUESTS PAGE (Developer) ══════════════════════════════ */
function MyRequestsPage({items,user,onNew}){
  const myItems=items.filter(i=>i.ownerId===user?.id||i.owner===user?.name);
  return <div style={{padding:"24px 28px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <div><h1 style={{fontSize:20,fontWeight:800}}>My Requests</h1><div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{myItems.length} activities</div></div>
      <button className="btn btn-primary" onClick={onNew}>+ New Activity</button>
    </div>
    {myItems.length===0&&<div className="card" style={{padding:48,textAlign:"center"}}><div style={{fontSize:36,marginBottom:12}}>📋</div><div style={{fontSize:15,fontWeight:700,marginBottom:4}}>No activities yet</div><div style={{fontSize:12,color:"var(--text3)"}}>Create your first activity to track it here.</div></div>}
    {myItems.map(i=>{
      const tc=TYPE_CFG[i.type]||TYPE_CFG.Feature;
      const pending=(i.promotionRequests||[]).filter(r=>r.status==="pending").length;
      const approved=(i.promotionRequests||[]).filter(r=>r.status==="approved").length;
      return <div key={i.id} className="card" style={{padding:"16px 20px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:11,color:"#D97706"}}>{i.dropNumber}</span>
              {i.versionLabel&&<span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--att-blue)"}}>{i.versionLabel}</span>}
              <span style={{background:tc.bg,color:tc.text,border:`1px solid ${tc.bd}`,borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"var(--mono)"}}>{i.type}</span>
              {pending>0&&<span style={{background:"#FFFBEB",color:"#D97706",border:"1px solid #FDE68A",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"var(--mono)"}}>⏳ {pending} pending</span>}
              {approved>0&&<span style={{background:"#F0FDF4",color:"#16A34A",border:"1px solid #BBF7D0",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"var(--mono)"}}>✅ {approved} approved</span>}
            </div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{i.title||"Untitled"}</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>{i.ticket||"No ticket"} · {i.createdAt}</div>
          </div>
          <PromoBar item={i}/>
        </div>
      </div>;
    })}
  </div>;
}

/* ══ REPORTS PAGE ═══════════════════════════════════════════════ */
function ReportsPage({items}){
  const byType=TYPE_OPTIONS.map(t=>({label:t,count:items.filter(i=>i.type===t).length,color:TYPE_CFG[t]?.text||"#64748B"}));
  const byPrio=["Critical","High","Medium","Low"].map(p=>({label:p,count:items.filter(i=>i.priority===p).length,color:PRIO_CFG[p]?.text||"#64748B"}));
  const allSvcs={};
  items.forEach(i=>(i.microservices||[]).filter(s=>s.name).forEach(s=>{if(!allSvcs[s.name])allSvcs[s.name]=[];allSvcs[s.name].push({version:s.version,drop:i.dropNumber,env:i.statuses});}));

  return <div style={{padding:"24px 28px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h1 style={{fontSize:20,fontWeight:800}}>Reports</h1>
      <button className="btn btn-ghost btn-sm" onClick={()=>exportToExcel(items,"report")}>⬇ Export Full Report</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
      {[{title:"By Type",data:byType},{title:"By Priority",data:byPrio}].map(({title,data})=><div key={title} className="card" style={{padding:"18px 20px"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{title}</div>
        {data.map(({label,count,color})=><div key={label} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:70,fontSize:11,fontWeight:600,color:"var(--text2)"}}>{label}</div>
          <div style={{flex:1,height:20,background:"#F1F5F9",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:items.length?`${Math.round((count/items.length)*100)}%`:"0%",background:color,borderRadius:4,transition:"width .5s",display:"flex",alignItems:"center",paddingLeft:6}}>
              {count>0&&<span style={{fontSize:10,fontWeight:700,color:"#fff"}}>{count}</span>}
            </div>
          </div>
          <div style={{width:26,fontSize:11,fontFamily:"var(--mono)",color:"var(--text3)",textAlign:"right"}}>{count}</div>
        </div>)}
      </div>)}
    </div>
    {/* Microservices table */}
    <div className="card" style={{padding:"18px 20px"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>Microservices Version Tracker</div>
      {Object.keys(allSvcs).length===0?<div style={{color:"var(--text3)",fontSize:12,textAlign:"center",padding:"20px 0"}}>No microservices tracked yet</div>:
      <div style={{overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#F8FAFC",borderBottom:"1.5px solid var(--border)"}}>
            {["Service","Latest Version","Drop","DEV","QA","DEV2","QA2","PROD"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontFamily:"var(--mono)",fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"var(--text3)"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {Object.entries(allSvcs).map(([name,versions])=><tr key={name} style={{borderBottom:"1px solid var(--border)"}}>
              <td style={{padding:"10px 12px",fontWeight:600}}>{name}</td>
              <td style={{padding:"10px 12px",fontFamily:"var(--mono)",color:"var(--att-blue-dark)",fontWeight:700}}>{versions[versions.length-1]?.version||"—"}</td>
              <td style={{padding:"10px 12px",fontFamily:"var(--mono)",color:"#D97706"}}>{versions[versions.length-1]?.drop||"—"}</td>
              {ENVS.map(env=>{const lastEnv=versions[versions.length-1]?.env?.[env]||"—";const sc=ENV_STATUS_CFG[lastEnv];return <td key={env} style={{padding:"8px 12px"}}><span style={{display:"inline-block",padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:600,fontFamily:"var(--mono)",background:sc?.bg||"#F8FAFC",color:sc?.text||"#94A3B8",border:`1px solid ${sc?.bd||"#E2E8F0"}`}}>{lastEnv}</span></td>;})}
            </tr>)}
          </tbody>
        </table>
      </div>}
    </div>
  </div>;
}

/* ══ SETTINGS PAGE ══════════════════════════════════════════════ */
function SettingsPage({user,onLogout,scriptUrl,onReconnect}){
  const rm=ROLE_META[user?.role]||ROLE_META.developer;
  return <div style={{padding:"24px 28px",maxWidth:600}}>
    <h1 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Settings</h1>
    <div className="card" style={{padding:"18px 20px",marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>Profile</div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <Avatar user={user} size={52}/>
        <div>
          <div style={{fontWeight:700,fontSize:16}}>{user?.name}</div>
          <RoleBadge role={user?.role}/>
          <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>Team: {user?.team}</div>
        </div>
      </div>
    </div>
    <div className="card" style={{padding:"18px 20px",marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Permissions</div>
      <div style={{fontSize:12,color:"var(--text2)",lineHeight:2}}>
        {rm.can.map(c=><div key={c}>✅ {c.replace(/_/g," ").charAt(0).toUpperCase()+c.replace(/_/g," ").slice(1)}</div>)}
      </div>
    </div>
    <div className="card" style={{padding:"18px 20px",marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Data Source</div>
      <div style={{fontSize:12,color:"var(--text3)",fontFamily:"var(--mono)",background:"#F8FAFC",padding:"8px 12px",borderRadius:6,border:"1px solid var(--border)",marginBottom:10,wordBreak:"break-all"}}>{scriptUrl||"Not connected"}</div>
      <button className="btn btn-ghost btn-sm" onClick={onReconnect}>Reconnect / Change URL</button>
    </div>
    <button className="btn btn-red" onClick={onLogout} style={{width:"100%",justifyContent:"center"}}>Sign Out</button>
  </div>;
}

/* ══ MAIN APP ═══════════════════════════════════════════════════ */
function App(){
  const [user,setUser]         = useState(()=>{try{return JSON.parse(localStorage.getItem(USER_KEY));}catch{return null;}});
  const [scriptUrl,setScriptUrl]= useState(()=>localStorage.getItem(SCRIPT_URL_KEY)||"");
  const [items,setItems]        = useState([]);
  const [loading,setLoading]    = useState(false);
  const [saving,setSaving]      = useState(false);
  const [error,setError]        = useState("");
  const [page,setPage]          = useState("dashboard");
  const [modal,setModal]        = useState(null);
  const [lastSync,setLastSync]  = useState(null);
  const [filter,setFilter]      = useState({type:"All",status:"All",track:"All",drop:"",search:""});
  const [sort,setSort]          = useState("createdAt");

  const fetchAll=useCallback(async(url=scriptUrl)=>{
    if(!url)return;
    setLoading(true);setError("");
    try{const r=await fetch(url+"?action=getAll");const j=await r.json();
      if(!j.ok)throw new Error(j.error);
      setItems((j.items||[]).map(i=>({...i,changes:i.changes||EMPTY_CHANGES(),microservices:i.microservices||[],promotionRequests:i.promotionRequests||[],auditLog:i.auditLog||[]})));
      setLastSync(new Date());
    }catch(e){setError("Load failed: "+e.message);}
    setLoading(false);
  },[scriptUrl]);

  useEffect(()=>{if(scriptUrl&&user)fetchAll(scriptUrl);},[scriptUrl,user]);

  const handleLogin=(u,url)=>{localStorage.setItem(USER_KEY,JSON.stringify(u));setUser(u);setScriptUrl(url);};
  const handleLogout=()=>{localStorage.removeItem(USER_KEY);setUser(null);setPage("dashboard");};
  const handleReconnect=()=>{localStorage.removeItem(SCRIPT_URL_KEY);setScriptUrl("");setUser(null);};

  const handleSave=async draft=>{
    setSaving(true);setError("");
    try{
      let toSave=modal?.mode==="new"?addAudit(draft,user,"Created activity"):addAudit(draft,user,"Updated activity");
      await callApi(scriptUrl,"save",toSave);
      if(modal?.mode==="new")setItems(p=>[toSave,...p]);
      else setItems(p=>p.map(i=>i.id===toSave.id?toSave:i));
      setModal(null);
    }catch(e){setError("Save failed: "+e.message);}
    setSaving(false);
  };

  const handleDelete=async id=>{
    setSaving(true);setError("");
    try{await callApi(scriptUrl,"delete",{id});setItems(p=>p.filter(i=>i.id!==id));setModal(null);}
    catch(e){setError("Delete failed: "+e.message);}
    setSaving(false);
  };

  const handleUpdateItem=async updated=>{
    setItems(p=>p.map(i=>i.id===updated.id?updated:i));
    try{await callApi(scriptUrl,"save",updated);}
    catch(e){setError("Update failed: "+e.message);}
  };

  const openNew=()=>setModal({mode:"new",item:EMPTY_ITEM(user)});
  const openEdit=item=>setModal({mode:"edit",item});

  const pendingCount=items.reduce((acc,i)=>acc+(i.promotionRequests||[]).filter(r=>r.status==="pending").length,0);
  const myWorkCount=items.reduce((acc,i)=>acc+(i.promotionRequests||[]).filter(r=>r.status==="approved"||r.status==="in_progress").length,0);

  if(!user||!scriptUrl) return <LoginScreen onLogin={handleLogin}/>;

  return <div className="layout">
    <Sidebar user={user} page={page} setPage={setPage} pendingCount={pendingCount} myWorkCount={myWorkCount}/>
    <div className="main-area">
      {/* Topbar */}
      <div className="topbar">
        <div style={{fontWeight:800,fontSize:15,color:"var(--att-blue-dark)",marginRight:"auto"}}>{APP_NAME}</div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {lastSync&&<span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--mono)"}}>Synced {lastSync.toLocaleTimeString()}</span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>fetchAll()} disabled={loading} style={{gap:6}}>
            {loading?<Spinner/>:"↺"} Refresh
          </button>
          {pendingCount>0&&<div style={{display:"flex",alignItems:"center",gap:6,background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:20,padding:"4px 12px",cursor:"pointer"}} onClick={()=>setPage("approvals")}>
            <span style={{fontSize:11}}>⏳</span><span style={{fontSize:11,fontWeight:700,color:"#D97706"}}>{pendingCount} pending</span>
          </div>}
          <Avatar user={user} size={30}/>
        </div>
      </div>

      {/* Error */}
      {error&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",margin:"16px 28px 0",borderRadius:8,padding:"10px 14px",color:"#DC2626",fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>⚠ {error}</span><button onClick={()=>setError("")} style={{background:"none",border:"none",color:"#DC2626",cursor:"pointer",fontSize:14}}>✕</button>
      </div>}

      {/* Pages */}
      <div style={{flex:1,overflow:"auto"}}>
        {page==="dashboard"  &&<DashboardPage  items={items} user={user} onNewActivity={openNew} setPage={setPage}/>}
        {page==="activities" &&<ActivitiesPage  items={items} user={user} onNew={openNew} onEdit={openEdit} onDelete={handleDelete} onStatusUpdate={handleUpdateItem} filter={filter} setFilter={setFilter} sort={sort} setSort={setSort}/>}
        {page==="approvals"  &&<ApprovalsPage   items={items} user={user} onUpdateItem={handleUpdateItem}/>}
        {page==="mywork"     &&<MyWorkPage       items={items} user={user} onUpdateItem={handleUpdateItem}/>}
        {page==="myrequests" &&<MyRequestsPage   items={items} user={user} onNew={openNew}/>}
        {page==="reports"    &&<ReportsPage       items={items}/>}
        {page==="settings"   &&<SettingsPage      user={user} onLogout={handleLogout} scriptUrl={scriptUrl} onReconnect={handleReconnect}/>}
      </div>
    </div>

    {modal&&<ItemModal item={modal.item} user={user} onSave={handleSave} onClose={()=>setModal(null)} onDelete={modal.mode==="edit"?handleDelete:null} saving={saving}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
